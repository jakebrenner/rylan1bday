<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Ryvite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .preview-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: linear-gradient(135deg, #1A1A2E, #2d2d4e); color: white;
      padding: 12px 20px; text-align: center; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 500;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      display: flex; align-items: center; justify-content: center; gap: 16px;
    }
    .preview-banner span { opacity: 0.9; }
    .preview-banner .close-preview {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.15); border: none; color: white;
      padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
      font-family: 'Inter', sans-serif;
    }
    .preview-banner .close-preview:hover { background: rgba(255,255,255,0.25); }
    .preview-tabs {
      display: none; gap: 4px;
    }
    .preview-tabs button {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7); padding: 4px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .preview-tabs button.active {
      background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.4);
      color: #fff;
    }
    .preview-tabs button:hover { background: rgba(255,255,255,0.2); }
    body { padding-top: 48px; }
    #previewFrame { width: 100%; border: none; min-height: calc(100vh - 48px); display: block; }
    .loading { text-align: center; padding: 60px; font-family: 'Inter', sans-serif; color: #666; }
  </style>
<script src="/js/meta-pixel.js"></script>
</head>
<body>
  <div class="preview-banner">
    <span>Preview mode — RSVP submissions won't be saved</span>
    <div id="previewTabs" class="preview-tabs">
      <button class="active" data-mode="invite" onclick="switchTab('invite')">Invite</button>
      <button data-mode="thankyou" onclick="switchTab('thankyou')">Thank You</button>
      <button data-mode="email" onclick="switchTab('email')">Email</button>
    </div>
    <button class="close-preview" onclick="window.close()">Close Preview</button>
  </div>
  <div id="loading" class="loading">Loading preview...</div>
  <iframe id="previewFrame" style="display:none;"></iframe>
  <script>
    var eventId = null;
    var eventData = null;
    var currentTab = 'invite';

    function switchTab(mode) {
      currentTab = mode;
      document.querySelectorAll('#previewTabs button').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-mode') === mode);
      });
      loadTab(mode);
    }

    function escapeHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function buildEmailPreview() {
      var config = eventData ? (eventData.themeConfig || {}) : {};
      var emailHtml = config.emailHtml || '';
      if (emailHtml) return emailHtml;

      // Build Ryvite-branded email template from theme colors (matches create page)
      var pc = config.primaryColor || '#E94560';
      var bodyFont = config.fontBody || 'Inter';
      var headlineFont = config.fontHeadline || 'Playfair Display';
      var title = escapeHtml(eventData.title || 'Your Event');
      var hostName = escapeHtml(eventData.hostName || eventData.host_name || 'Your host');
      var eventDate = '';
      if (eventData.event_date || eventData.eventDate) {
        eventDate = new Date(eventData.event_date || eventData.eventDate)
          .toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      }
      var location = escapeHtml(eventData.location_name || eventData.locationName || '');

      var detailRows = '';
      if (eventDate) {
        detailRows += '<tr><td style="width:32px;vertical-align:top;padding-right:12px;"><p style="margin:0;font-size:18px;">&#128197;</p></td>'
          + '<td><p style="font-family:\'' + bodyFont + '\',Arial,sans-serif;font-size:14px;color:#1A1A2E;margin:0;font-weight:600;">' + escapeHtml(eventDate) + '</p></td></tr>';
      }
      if (location) {
        detailRows += '<tr><td style="width:32px;vertical-align:top;padding-right:12px;' + (eventDate ? 'padding-top:10px;' : '') + '"><p style="margin:0;font-size:18px;">&#128205;</p></td>'
          + '<td style="' + (eventDate ? 'padding-top:10px;' : '') + '"><p style="font-family:\'' + bodyFont + '\',Arial,sans-serif;font-size:14px;color:#5A5A6E;margin:0;">' + location + '</p></td></tr>';
      }
      var detailsSection = detailRows
        ? '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td style="padding:20px 32px 0;">'
          + '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#FFF5F0;border-radius:12px;"><tr><td style="padding:18px 20px;">'
          + '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">' + detailRows + '</table>'
          + '</td></tr></table></td></tr></table>'
        : '';

      return '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">'
        + '<style>body{margin:0;padding:0;background-color:#FFFFFF;}</style></head>'
        + '<body style="margin:0;padding:0;background-color:#FFFFFF;">'
        + '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#FFFFFF;padding:32px 16px;">'
        + '<tr><td align="center"><table role="presentation" width="480" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;width:100%;">'
        + '<tr><td align="center" style="padding:0;"><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:' + pc + ';border-radius:16px 16px 0 0;">'
        + '<tr><td style="padding:40px 32px 32px;text-align:center;">'
        + '<p style="margin:0 0 8px;font-size:28px;">&#10024;</p>'
        + '<p style="margin:0 0 6px;font-family:\'' + bodyFont + '\',Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#FFFFFF;opacity:0.7;">YOU\'RE INVITED</p>'
        + '<h1 style="margin:0;font-family:\'' + headlineFont + '\',Georgia,serif;font-size:28px;font-weight:700;color:#FFFFFF;line-height:1.25;">' + title + '</h1>'
        + '</td></tr></table></td></tr>'
        + '<tr><td style="background-color:#FFFFFF;padding:0;border-radius:0 0 16px 16px;border:1px solid #f0ebe5;border-top:none;">'
        + '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">'
        + '<tr><td style="padding:28px 32px 0;">'
        + '<p style="font-family:\'' + bodyFont + '\',Arial,sans-serif;font-size:15px;color:#1A1A2E;margin:0;">Hey Sarah,</p>'
        + '<p style="font-family:\'' + bodyFont + '\',Arial,sans-serif;font-size:15px;color:#5A5A6E;margin:6px 0 0;">' + hostName + ' would love for you to be there! Check out the full invite and let them know if you can make it.</p>'
        + '</td></tr></table>'
        + detailsSection
        + '<table role="presentation" cellpadding="0" cellspacing="0" border="0"><tr><td style="height:28px;" height="28">&nbsp;</td></tr></table>'
        + '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td align="center" style="padding:0 32px 0;">'
        + '<a href="#" style="display:inline-block;padding:16px 48px;background-color:' + pc + ';color:#FFFFFF;font-size:16px;font-weight:700;text-decoration:none;border-radius:50px;font-family:\'' + bodyFont + '\',Arial,sans-serif;min-width:200px;text-align:center;">View Invitation &amp; RSVP</a>'
        + '</td></tr></table>'
        + '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td style="padding:24px 32px 24px;">'
        + '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td style="border-top:1px solid #f0ebe5;height:1px;">&nbsp;</td></tr></table>'
        + '<p style="font-family:\'' + bodyFont + '\',Arial,sans-serif;font-size:12px;color:#B0B0B8;margin:16px 0 0;text-align:center;">Tap the button to see your full invitation and RSVP</p>'
        + '</td></tr></table></td></tr>'
        + '<tr><td align="center" style="padding:24px 0 0;">'
        + '<p style="margin:0;font-size:11px;color:#C8C8D0;font-family:\'' + bodyFont + '\',Arial,sans-serif;">Sent via <span style="color:#E94560;font-weight:600;">Ryvite</span> &mdash; Beautiful invitations, effortlessly.</p>'
        + '</td></tr>'
        + '</table></td></tr></table></body></html>';
    }

    function loadTab(mode) {
      var iframe = document.getElementById('previewFrame');
      if (mode === 'email') {
        iframe.removeAttribute('src');
        iframe.srcdoc = buildEmailPreview();
        iframe.onload = function() {
          try { iframe.style.height = Math.max(iframe.contentDocument.body.scrollHeight + 48, 600) + 'px'; } catch(e) {}
        };
      } else {
        // Invite and Thank You: load the real event page with preview flag
        var viewParam = mode === 'thankyou' ? '&view=thankyou' : '';
        iframe.removeAttribute('srcdoc');
        iframe.src = '/v2/event/index.html?eid=' + encodeURIComponent(eventId) + '&preview=true' + viewParam;
        iframe.onload = function() {
          try { iframe.style.height = Math.max(iframe.contentDocument.body.scrollHeight + 48, 600) + 'px'; } catch(e) {
            // Cross-origin fallback — just use full viewport
            iframe.style.height = 'calc(100vh - 48px)';
          }
        };
      }
    }

    (async function() {
      var params = new URLSearchParams(window.location.search);
      eventId = params.get('eventId');
      if (!eventId) { document.getElementById('loading').textContent = 'No event specified'; return; }

      // Fetch event data once (needed for email tab)
      var token = localStorage.getItem('sb_access_token');
      try {
        var res = await fetch('/api/v2/events?action=get&eventId=' + encodeURIComponent(eventId), {
          headers: token ? { 'Authorization': 'Bearer ' + token } : {}
        });
        var result = await res.json();
        if (!result.success || !result.event) {
          document.getElementById('loading').textContent = 'Event not found';
          return;
        }
        eventData = result.event;

        // Show tabs and load invite view
        document.getElementById('previewTabs').style.display = 'flex';
        document.getElementById('loading').style.display = 'none';
        var iframe = document.getElementById('previewFrame');
        iframe.style.display = 'block';
        loadTab('invite');
      } catch(err) {
        document.getElementById('loading').textContent = 'Error loading preview';
      }
    })();
  </script>
</body>
</html>
