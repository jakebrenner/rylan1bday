<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Ryvite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .preview-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: linear-gradient(135deg, #1A1A2E, #2d2d4e); color: white;
      padding: 12px 20px; text-align: center; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 500;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .preview-banner span { opacity: 0.9; }
    .preview-banner .close-preview {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.15); border: none; color: white;
      padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
      font-family: 'Inter', sans-serif;
    }
    .preview-banner .close-preview:hover { background: rgba(255,255,255,0.25); }
    body { padding-top: 48px; }
    #previewFrame { width: 100%; border: none; min-height: calc(100vh - 48px); display: block; }
    .loading { text-align: center; padding: 60px; font-family: 'Inter', sans-serif; color: #666; }
  </style>
</head>
<body>
  <div class="preview-banner">
    <span>This is just a preview — form entries will not be saved</span>
    <button class="close-preview" onclick="window.close()">Close Preview</button>
  </div>
  <div id="loading" class="loading">Loading preview...</div>
  <iframe id="previewFrame" style="display:none;"></iframe>
  <script>
    (async function() {
      var params = new URLSearchParams(window.location.search);
      var eventId = params.get('eventId');
      if (!eventId) { document.getElementById('loading').textContent = 'No event specified'; return; }

      var token = localStorage.getItem('sb_access_token');
      try {
        var res = await fetch('/api/v2/events?action=get&eventId=' + encodeURIComponent(eventId), {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        var result = await res.json();
        if (!result.success || !result.event) {
          document.getElementById('loading').textContent = 'Event not found';
          return;
        }
        var ev = result.event;
        if (!ev.themeHtml || !ev.themeCss) {
          document.getElementById('loading').textContent = 'No theme generated yet';
          return;
        }
        var config = ev.themeConfig || {};
        var fontsImport = config.googleFontsImport || '';
        var iframe = document.getElementById('previewFrame');
        var customFields = ev.customFields || [];

        // Build RSVP form fields from the event's actual custom fields
        var fieldStyle = 'width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;background:#f9f9f9;font-family:Inter,sans-serif;';
        var labelStyle = 'display:block;margin-bottom:6px;font-weight:600;font-size:14px;';
        var groupStyle = 'margin-bottom:16px;';
        var rsvpFormHtml = '<div style="margin-bottom:16px;"><label style="' + labelStyle + '">Name <span style="color:#E94560;">*</span></label><input type="text" placeholder="Your name" disabled style="' + fieldStyle + '"></div>'
          + '<div style="' + groupStyle + '"><label style="' + labelStyle + '">RSVP Status <span style="color:#E94560;">*</span></label>'
          + '<div style="display:flex;gap:6px;">'
          + '<label style="flex:1;display:flex;align-items:center;justify-content:center;padding:10px 6px;border:2px solid #E94560;border-radius:8px;font-size:13px;font-weight:500;background:#E94560;color:#fff;"><input type="radio" name="rsvpStatus" value="Attending" checked disabled style="display:none;">Attending</label>'
          + '<label style="flex:1;display:flex;align-items:center;justify-content:center;padding:10px 6px;border:2px solid #ddd;border-radius:8px;font-size:13px;font-weight:500;background:#f9f9f9;color:#333;"><input type="radio" name="rsvpStatus" value="Declined" disabled style="display:none;">Declined</label>'
          + '<label style="flex:1;display:flex;align-items:center;justify-content:center;padding:10px 6px;border:2px solid #ddd;border-radius:8px;font-size:13px;font-weight:500;background:#f9f9f9;color:#333;"><input type="radio" name="rsvpStatus" value="Maybe" disabled style="display:none;">Maybe</label>'
          + '</div></div>';

        // Add custom fields from event config
        customFields.forEach(function(f) {
          if (f.key === 'email' || f.key === 'name' || f.key === 'status') return; // skip built-ins already rendered
          var req = f.required ? ' <span style="color:#E94560;">*</span>' : '';
          var label = (f.label || f.key || '').replace(/</g, '&lt;');
          rsvpFormHtml += '<div style="' + groupStyle + '"><label style="' + labelStyle + '">' + label + req + '</label>';
          if (f.type === 'checkbox') {
            rsvpFormHtml += '<label style="display:flex;align-items:center;gap:8px;font-size:16px;cursor:pointer;">'
              + '<input type="checkbox" disabled style="width:18px;height:18px;">'
              + '<span>' + (f.placeholder || f.label || '').replace(/</g, '&lt;') + '</span></label>';
          } else if (f.type === 'select' && f.options && f.options.length > 0) {
            rsvpFormHtml += '<select disabled style="' + fieldStyle + '"><option>' + f.options[0].replace(/</g, '&lt;') + '</option></select>';
          } else if (f.type === 'textarea') {
            rsvpFormHtml += '<textarea disabled placeholder="' + (f.placeholder || '').replace(/"/g, '&quot;') + '" style="' + fieldStyle + 'min-height:60px;resize:none;"></textarea>';
          } else if (f.type === 'number') {
            rsvpFormHtml += '<input type="number" placeholder="' + (f.placeholder || '0').replace(/"/g, '&quot;') + '" disabled style="' + fieldStyle + '">';
          } else if (f.type === 'email') {
            rsvpFormHtml += '<input type="email" placeholder="' + (f.placeholder || 'your@email.com').replace(/"/g, '&quot;') + '" disabled style="' + fieldStyle + '">';
          } else if (f.type === 'phone' || f.type === 'tel') {
            rsvpFormHtml += '<input type="tel" placeholder="' + (f.placeholder || '(555) 123-4567').replace(/"/g, '&quot;') + '" disabled style="' + fieldStyle + '">';
          } else {
            rsvpFormHtml += '<input type="text" placeholder="' + (f.placeholder || '').replace(/"/g, '&quot;') + '" disabled style="' + fieldStyle + '">';
          }
          rsvpFormHtml += '</div>';
        });

        rsvpFormHtml += '<button disabled style="width:100%;padding:14px;background:#ccc;color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:not-allowed;font-family:Inter,sans-serif;">Preview Only — RSVP Disabled</button>';

        // Inject RSVP form into the theme's .rsvp-slot container (if it exists)
        // This replaces the placeholder RSVP button in the generated theme
        var injectScript = '<script>'
          + 'var slot = document.querySelector(".rsvp-slot");'
          + 'if (slot) { slot.innerHTML = \'' + rsvpFormHtml.replace(/'/g, "\\'").replace(/\n/g, '') + '\'; }'
          + '<\/script>';

        iframe.srcdoc = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">'
          + '<style>* { margin:0; padding:0; box-sizing:border-box; } html, body { background: #f9f9f9; } ' + fontsImport + '</style>'
          + '<style>' + ev.themeCss + '</style></head><body>'
          + ev.themeHtml + injectScript
          + '<div style="text-align:center;padding:20px;font-size:13px;color:#999;font-family:Inter,sans-serif;"><a href="/" style="color:#999;text-decoration:none;">Made with Ryvite</a></div>'
          + '</body></html>';
        iframe.style.display = 'block';
        document.getElementById('loading').style.display = 'none';
        iframe.onload = function() {
          try { iframe.style.height = Math.max(iframe.contentDocument.body.scrollHeight + 48, 600) + 'px'; } catch(e) {}
        };
      } catch(err) {
        document.getElementById('loading').textContent = 'Error loading preview';
      }
    })();
  </script>
</body>
</html>
