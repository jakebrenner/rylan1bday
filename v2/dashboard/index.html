<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Ryvite</title>
  <meta name="description" content="Manage your Ryvite events and AI-designed invitations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --party-coral: #E94560; --blush-pop: #FF6B6B; --midnight: #1A1A2E;
      --confetti-gold: #FFB74D; --mint-fizz: #4ECDC4; --party-purple: #A78BFA; --cream: #FFFAF5;
    }
    html, body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--midnight); }

    /* Header */
    .header { background: white; border-bottom: 1px solid #eee; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; }
    .header-left a { text-decoration: none; display: flex; align-items: center; }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .btn { padding: 12px 20px; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: var(--party-coral); color: white; }
    .btn-primary:hover { background: var(--blush-pop); transform: translateY(-2px); }

    /* Profile dropdown */
    .profile-menu { position: relative; }
    .profile-btn {
      width: 44px; height: 44px; border-radius: 50%; border: 2px solid #eee; background: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .profile-btn:hover { border-color: var(--party-coral); }
    .profile-btn svg { width: 22px; height: 22px; fill: #666; }
    .profile-dropdown {
      display: none; position: absolute; top: 52px; right: 0; background: white;
      border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); min-width: 240px;
      z-index: 100; overflow: hidden; border: 1px solid #eee;
    }
    .profile-dropdown.open { display: block; }
    .profile-dropdown-header { padding: 16px; border-bottom: 1px solid #eee; }
    .profile-dropdown-name { font-weight: 600; font-size: 15px; }
    .profile-dropdown-email { font-size: 13px; color: #666; margin-top: 2px; }
    .profile-dropdown-item {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px; font-size: 14px;
      cursor: pointer; transition: background 0.15s; border: none; background: none;
      width: 100%; text-align: left; font-family: 'Inter', sans-serif; color: var(--midnight);
    }
    .profile-dropdown-item:hover { background: #f5f5f5; }
    .profile-dropdown-item svg { width: 18px; height: 18px; fill: #666; flex-shrink: 0; }
    .profile-dropdown-divider { height: 1px; background: #eee; }
    .profile-dropdown-item.danger { color: #dc3545; }
    .profile-dropdown-item.danger svg { fill: #dc3545; }

    /* Main content */
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--midnight); }
    .archive-toggle { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #666; cursor: pointer; user-select: none; }
    .archive-toggle input { width: 18px; height: 18px; accent-color: var(--party-coral); cursor: pointer; }
    .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 12px; border: 2px dashed #ddd; }
    .empty-state h3 { font-size: 20px; margin-bottom: 12px; }
    .empty-state p { color: #666; margin-bottom: 24px; font-size: 15px; }
    .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .event-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.2s; }
    .event-card:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.12); }
    .event-card-header { position: relative; min-height: 160px; overflow: hidden; }
    .archive-x-btn {
      position: absolute; top: 8px; right: 8px; z-index: 2;
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.45); color: white; font-size: 16px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.2s; backdrop-filter: blur(4px);
    }
    .archive-x-btn:hover { background: rgba(220,53,69,0.85); transform: scale(1.1); }
    .event-card-header.has-preview { padding: 0; }
    .event-card-header.no-preview { background: linear-gradient(135deg, var(--party-coral), var(--confetti-gold)); padding: 20px; color: white; display: flex; flex-direction: column; justify-content: space-between; }
    .event-card-header iframe { width: 393px; height: 852px; border: none; pointer-events: none; transform-origin: top left; position: absolute; top: 0; left: 50%; }
    .event-card-header-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.6)); color: white; z-index: 1; }
    .event-card h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .event-card-date { font-size: 13px; opacity: 0.9; }
    .event-card-body { padding: 16px; }
    .event-meta { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 10px; align-items: center; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-draft { background: #fff3cd; color: #856404; }
    .status-published { background: #d4edda; color: #155724; }
    .status-archived { background: #e2e3e5; color: #383d41; }
    .progress-track { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin: 10px 0 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .progress-label { font-size: 12px; color: #999; margin-bottom: 10px; }
    .event-actions { display: flex; gap: 8px; margin-top: 12px; }
    .event-actions button, .event-actions a {
      flex: 1; padding: 10px 14px; border: 1px solid #ddd; background: white; border-radius: 8px;
      font-size: 14px; cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--midnight);
      text-align: center; font-family: 'Inter', sans-serif; min-height: 44px;
      display: inline-flex; align-items: center; justify-content: center; font-weight: 500;
    }
    .event-actions button:hover, .event-actions a:hover { background: #f9f9f9; border-color: var(--party-coral); color: var(--party-coral); }
    .loading { text-align: center; padding: 60px 20px; color: #666; font-size: 15px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--midnight); color: white; padding: 14px 24px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out; z-index: 100; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Share section */
    .share-row { margin-top: 12px; }
    .invite-link-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .invite-link-input { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; color: #666; font-family: 'Inter', sans-serif; }
    .copy-btn { padding: 10px 16px; border: 1px solid var(--party-coral); background: white; color: var(--party-coral); border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; font-family: 'Inter', sans-serif; min-height: 44px; white-space: nowrap; }
    .copy-btn:hover { background: var(--party-coral); color: white; }
    .share-buttons { display: flex; gap: 8px; }
    .share-btn { flex: 1; padding: 10px 8px; border: 1px solid #ddd; background: white; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; min-height: 44px; display: flex; align-items: center; justify-content: center; gap: 4px; transition: all 0.2s; color: var(--midnight); text-decoration: none; font-weight: 500; }
    .share-btn:hover { border-color: var(--party-coral); color: var(--party-coral); }

    /* Confirm Modal */
    .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; }
    .confirm-overlay.active { display: flex; }
    .confirm-box { background: white; border-radius: 16px; padding: 28px; max-width: 380px; width: 90%; box-shadow: 0 12px 40px rgba(0,0,0,0.2); animation: confirmPop 0.2s ease-out; text-align: center; }
    @keyframes confirmPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--midnight); }
    .confirm-msg { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.5; }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-actions button { flex: 1; padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; min-height: 44px; border: none; transition: all 0.15s; }
    .confirm-cancel { background: #f0f0f0; color: var(--midnight); }
    .confirm-cancel:hover { background: #e4e4e4; }
    .confirm-ok { color: white; }
    .confirm-ok:hover { filter: brightness(1.1); transform: translateY(-1px); }

    /* RSVP Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
    .modal-overlay.active { display: flex; align-items: flex-end; justify-content: center; }
    .rsvp-modal { background: white; width: 100%; max-width: 600px; max-height: 85vh; border-radius: 16px 16px 0 0; overflow: hidden; display: flex; flex-direction: column; animation: slideUpModal 0.3s ease-out; }
    @keyframes slideUpModal { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .rsvp-modal-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .rsvp-modal-header h3 { font-size: 18px; font-weight: 600; }
    .rsvp-modal-close { width: 44px; height: 44px; border: none; background: #f0f0f0; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .rsvp-modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .rsvp-stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .rsvp-stat { flex: 1; min-width: 80px; padding: 12px; border-radius: 8px; text-align: center; }
    .rsvp-stat-num { font-size: 24px; font-weight: 700; }
    .rsvp-stat-label { font-size: 12px; color: #666; margin-top: 4px; }
    .rsvp-stat.attending { background: #d4edda; color: #155724; }
    .rsvp-stat.declined { background: #f8d7da; color: #721c24; }
    .rsvp-stat.maybe { background: #fff3cd; color: #856404; }
    .rsvp-list { list-style: none; }
    .rsvp-item { padding: 14px 0; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
    .rsvp-item:last-child { border-bottom: none; }
    .rsvp-item-info { flex: 1; }
    .rsvp-item-name { font-weight: 600; font-size: 15px; }
    .rsvp-item-detail { font-size: 13px; color: #666; margin-top: 2px; }
    .rsvp-item-status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .rsvp-empty { text-align: center; padding: 40px 20px; color: #999; font-size: 15px; }

    @media (max-width: 640px) {
      .header { padding: 10px 16px; }
      .header-right { gap: 8px; }
      .btn { padding: 10px 14px; font-size: 13px; }
      .container { margin: 20px auto; padding: 0 16px; }
      .section-title { font-size: 24px; }
      .event-grid { grid-template-columns: 1fr; gap: 16px; }
      .event-actions { flex-wrap: wrap; }
      .share-buttons { flex-wrap: wrap; }
      .share-btn { min-width: calc(50% - 4px); }
      .rsvp-modal { max-height: 90vh; }
      .profile-dropdown { right: -8px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <a href="/"><svg viewBox="0 0 210 80" xmlns="http://www.w3.org/2000/svg" style="height:56px;width:auto;"><circle cx="32" cy="40" r="22" fill="none" stroke="var(--party-coral)" stroke-width="2.2"/><path d="M18 30 L32 42 L46 30" fill="none" stroke="var(--party-coral)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 50 L46 50" fill="none" stroke="var(--party-coral)" stroke-width="1.8" stroke-linecap="round"/><text x="64" y="52" font-family="Playfair Display, serif" font-size="34" font-weight="700" fill="var(--midnight)">Ryvite</text></svg></a>
    </div>
    <div class="header-right">
      <a href="/v2/create/" class="btn btn-primary">+ New Event</a>
      <div class="profile-menu">
        <button class="profile-btn" onclick="toggleProfileMenu()" id="profileBtn">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </button>
        <div class="profile-dropdown" id="profileDropdown">
          <div class="profile-dropdown-header">
            <div class="profile-dropdown-name" id="profileName"></div>
            <div class="profile-dropdown-email" id="profileEmail"></div>
          </div>
          <a class="profile-dropdown-item" href="/v2/profile/" style="text-decoration:none;">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Profile
          </a>
          <div class="profile-dropdown-divider"></div>
          <button class="profile-dropdown-item danger" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            Log Out
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="section-header">
      <div class="section-title">Your Events</div>
      <label class="archive-toggle">
        <input type="checkbox" id="showArchived" onchange="renderEvents(allEvents)">
        Show Archived
      </label>
    </div>
    <div id="loading" class="loading">Loading your events...</div>
    <div id="emptyState" class="empty-state" style="display: none;">
      <h3>No events yet</h3>
      <p>Ready to create your first beautiful AI-designed invite?</p>
      <a href="/v2/create/" class="btn btn-primary">Create Your First Event</a>
    </div>
    <div id="eventGrid" class="event-grid" style="display: none;"></div>
  </div>

  <!-- Confirm Modal -->
  <div class="confirm-overlay" id="confirmModal" onclick="if(event.target===this)closeConfirm()">
    <div class="confirm-box">
      <div class="confirm-title" id="confirmTitle"></div>
      <div class="confirm-msg" id="confirmMsg"></div>
      <div class="confirm-actions">
        <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="confirm-ok" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

  <!-- RSVP Modal -->
  <div class="modal-overlay" id="rsvpModal" onclick="if(event.target===this)closeRSVPModal()">
    <div class="rsvp-modal">
      <div class="rsvp-modal-header">
        <h3 id="rsvpModalTitle">RSVPs</h3>
        <button class="rsvp-modal-close" onclick="closeRSVPModal()">&times;</button>
      </div>
      <div class="rsvp-modal-body" id="rsvpModalBody">
        <div class="loading">Loading RSVPs...</div>
      </div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('sb_access_token');
    var user = JSON.parse(localStorage.getItem('v2_user') || 'null');
    var allEvents = [];

    if (!token || !user) {
      window.location.href = '/v2/login/';
    } else {
      document.getElementById('profileName').textContent = user.displayName || user.email?.split('@')[0] || '';
      document.getElementById('profileEmail').textContent = user.email || '';
    }

    // Profile dropdown
    function toggleProfileMenu() {
      document.getElementById('profileDropdown').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.profile-menu')) {
        document.getElementById('profileDropdown').classList.remove('open');
      }
    });

    // Token Refresh
    async function refreshToken() {
      var rt = localStorage.getItem('sb_refresh_token');
      if (!rt) { logout(); return false; }
      try {
        var res = await fetch('/api/v2/auth?action=refresh', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refreshToken: rt })
        });
        var result = await res.json();
        if (result.success) {
          token = result.accessToken;
          localStorage.setItem('sb_access_token', result.accessToken);
          localStorage.setItem('sb_refresh_token', result.refreshToken);
          if (result.expiresAt) localStorage.setItem('sb_token_expires_at', result.expiresAt);
          return true;
        }
      } catch (e) {}
      logout();
      return false;
    }

    async function authFetch(url, opts) {
      opts = opts || {}; opts.headers = opts.headers || {};
      opts.headers['Authorization'] = 'Bearer ' + token;
      var res = await fetch(url, opts);
      if (res.status === 401) {
        var refreshed = await refreshToken();
        if (refreshed) { opts.headers['Authorization'] = 'Bearer ' + token; res = await fetch(url, opts); }
      }
      return res;
    }

    // Validate token
    (async function() {
      if (!token) return;
      try { var res = await fetch('/api/v2/auth?action=profile', { headers: { 'Authorization': 'Bearer ' + token } }); if (!res.ok) await refreshToken(); } catch (err) {}
    })();

    // Published event toast
    var params = new URLSearchParams(window.location.search);
    if (params.get('published')) {
      showToast('Event published successfully!');
      window.history.replaceState({}, '', '/v2/dashboard/');
    }

    async function loadDashboard() {
      try {
        var res = await authFetch('/api/v2/events?action=list');
        var result = await res.json();
        document.getElementById('loading').style.display = 'none';
        if (result.success && result.events && result.events.length > 0) {
          allEvents = result.events;
          renderEvents(result.events);
        } else {
          document.getElementById('emptyState').style.display = 'block';
        }
      } catch (err) {
        console.error(err);
        document.getElementById('loading').innerHTML = 'Error loading events. <button onclick="loadDashboard()" style="color: var(--party-coral); background: none; border: none; cursor: pointer; text-decoration: underline; font-size: 15px;">Retry</button>';
      }
    }

    function getProgressInfo(event) {
      var step = (event.settings && event.settings.creation_step) || 1;
      var status = (event.status || 'Draft').toLowerCase();
      if (status === 'published') return { pct: 100, label: 'Published', color: 'var(--mint-fizz)' };
      if (status === 'archived') return { pct: 100, label: 'Archived', color: '#ccc' };
      var steps = { 1: { pct: 25, label: 'Event details' }, 2: { pct: 50, label: 'Creative direction' }, 3: { pct: 75, label: 'Theme generated' }, 4: { pct: 90, label: 'Ready to publish' } };
      var s = steps[step] || steps[1];
      return { pct: s.pct, label: s.label, color: 'var(--confetti-gold)' };
    }

    function renderEvents(events) {
      var showArchived = document.getElementById('showArchived').checked;
      var filtered = events.filter(function(e) {
        if ((e.status || '').toLowerCase() === 'archived') return showArchived;
        return true;
      });

      var grid = document.getElementById('eventGrid');
      if (filtered.length === 0) {
        grid.style.display = 'none';
        document.getElementById('emptyState').style.display = showArchived ? 'none' : 'block';
        if (showArchived && events.length > 0) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">No events to show</div>';
          grid.style.display = 'grid';
        }
        return;
      }

      document.getElementById('emptyState').style.display = 'none';
      grid.innerHTML = filtered.map(function(event) {
        var eventDate = event.eventDate ? new Date(event.eventDate).toLocaleDateString() : 'No date set';
        var statusClass = 'status-' + (event.status || 'draft').toLowerCase();
        var isDraft = (event.status || 'Draft').toLowerCase() === 'draft';
        var isPublished = event.status === 'Published';
        var isArchived = (event.status || '').toLowerCase() === 'archived';
        var inviteUrl = window.location.origin + '/v2/event/' + encodeURIComponent(event.slug);
        var prog = getProgressInfo(event);

        var progressHtml = '';
        if (isDraft) {
          progressHtml = '<div class="progress-track"><div class="progress-fill" style="width:' + prog.pct + '%;background:' + prog.color + ';"></div></div>'
            + '<div class="progress-label">' + prog.pct + '% — ' + escapeHtml(prog.label) + '</div>';
        }

        var shareHtml = '';
        if (isPublished) {
          shareHtml = '<div class="share-row">'
            + '<div class="invite-link-row">'
            + '<input class="invite-link-input" value="' + escapeHtml(inviteUrl) + '" readonly onclick="this.select()">'
            + '<button class="copy-btn" onclick="copyLink(this, \'' + escapeHtml(inviteUrl) + '\')">Copy</button>'
            + '</div>'
            + '<div class="share-buttons">'
            + '<a class="share-btn" href="sms:?body=' + encodeURIComponent("You're invited! RSVP here: " + inviteUrl) + '">SMS</a>'
            + '<a class="share-btn" href="mailto:?subject=' + encodeURIComponent(event.title + ' - You\'re Invited!') + '&body=' + encodeURIComponent("You're invited to " + event.title + "!\n\nRSVP here: " + inviteUrl) + '">Email</a>'
            + '</div></div>';
        }

        var actionsHtml = '<div class="event-actions">';
        if (isDraft) {
          actionsHtml += '<a href="/v2/create/?eventId=' + encodeURIComponent(event.id) + '">Continue</a>';
        } else if (!isArchived) {
          actionsHtml += '<a href="/v2/event/' + encodeURIComponent(event.slug) + '" target="_blank">View</a>';
          actionsHtml += '<button onclick="openRSVPModal(\'' + event.id + '\', \'' + escapeHtml(event.title).replace(/'/g, "\\'") + '\')">RSVPs</button>';
        } else {
          actionsHtml += '<a href="/v2/event/' + encodeURIComponent(event.slug) + '" target="_blank">View</a>';
        }
        actionsHtml += '</div>';

        var unarchiveHtml = '';
        if (isArchived) {
          unarchiveHtml = '<button onclick="unarchiveEvent(\'' + event.id + '\', this)" style="width:100%;padding:10px 14px;border:1px solid #ddd;background:white;border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s;font-family:Inter,sans-serif;min-height:44px;display:inline-flex;align-items:center;justify-content:center;font-weight:500;color:var(--midnight);margin-top:8px;" onmouseover="this.style.borderColor=\'var(--mint-fizz)\';this.style.color=\'var(--mint-fizz)\'" onmouseout="this.style.borderColor=\'#ddd\';this.style.color=\'var(--midnight)\'">Unarchive</button>';
        }
        actionsHtml += unarchiveHtml;

        var archiveXHtml = !isArchived ? '<button class="archive-x-btn" onclick="event.stopPropagation();archiveEvent(\'' + event.id + '\', this)" title="Archive">&times;</button>' : '';

        var hasTheme = event.themeHtml && event.themeCss;
        var headerHtml = '';
        if (hasTheme) {
          var config = event.themeConfig || {};
          var fontsImport = config.googleFontsImport || '';
          var srcdoc = '<!DOCTYPE html><html><head><meta charset=&quot;UTF-8&quot;><meta name=&quot;viewport&quot; content=&quot;width=device-width,initial-scale=1.0&quot;><style>*{margin:0;padding:0;box-sizing:border-box}html,body{background:#f9f9f9;overflow:hidden}' + fontsImport.replace(/"/g, '&quot;') + '</style><style>' + event.themeCss.replace(/"/g, '&quot;') + '</style></head><body>' + event.themeHtml.replace(/"/g, '&quot;') + '</body></html>';
          headerHtml = '<div class="event-card-header has-preview"' + (isArchived ? ' style="opacity:0.7"' : '') + '>'
            + archiveXHtml
            + '<iframe srcdoc="' + srcdoc + '" sandbox="allow-same-origin" loading="lazy"></iframe>'
            + '<div class="event-card-header-overlay">'
            + '<h3>' + escapeHtml(event.title) + '</h3>'
            + '<span class="event-card-date">' + eventDate + '</span>'
            + '</div></div>';
        } else {
          headerHtml = '<div class="event-card-header no-preview"' + (isArchived ? ' style="opacity:0.7"' : '') + '>'
            + archiveXHtml
            + '<h3>' + escapeHtml(event.title) + '</h3>'
            + '<span class="event-card-date">' + eventDate + '</span>'
            + '</div>';
        }

        return '<div class="event-card">'
          + headerHtml
          + '<div class="event-card-body">'
          + '<div class="event-meta">'
          + '<span>' + escapeHtml(event.locationName || 'No location') + '</span>'
          + '<span class="status-badge ' + statusClass + '">' + (event.status || 'Draft') + '</span>'
          + '</div>'
          + progressHtml
          + shareHtml
          + actionsHtml
          + '</div></div>';
      }).join('');
      grid.style.display = 'grid';
      // Scale preview iframes to fit card width
      requestAnimationFrame(function() {
        grid.querySelectorAll('.event-card-header.has-preview').forEach(function(header) {
          var iframe = header.querySelector('iframe');
          if (!iframe) return;
          var cardWidth = header.offsetWidth;
          var scale = cardWidth / 393;
          var visibleHeight = 160;
          iframe.style.transform = 'scale(' + scale + ')';
          iframe.style.marginLeft = '-' + (393 / 2) + 'px';
          header.style.height = visibleHeight + 'px';
        });
      });
    }

    function copyLink(btn, url) {
      navigator.clipboard.writeText(url).then(function() {
        btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
      });
    }

    // RSVP Modal
    async function openRSVPModal(eventId, title) {
      document.getElementById('rsvpModalTitle').textContent = 'RSVPs — ' + title;
      document.getElementById('rsvpModalBody').innerHTML = '<div class="loading">Loading RSVPs...</div>';
      document.getElementById('rsvpModal').classList.add('active');
      document.body.style.overflow = 'hidden';
      try {
        var res = await authFetch('/api/v2/events?action=rsvps&eventId=' + encodeURIComponent(eventId));
        var result = await res.json();
        if (result.success) renderRSVPs(result.rsvps || []);
        else document.getElementById('rsvpModalBody').innerHTML = '<div class="rsvp-empty">Error loading RSVPs</div>';
      } catch (err) {
        document.getElementById('rsvpModalBody').innerHTML = '<div class="rsvp-empty">Error loading RSVPs</div>';
      }
    }

    function renderRSVPs(rsvps) {
      var body = document.getElementById('rsvpModalBody');
      if (rsvps.length === 0) {
        body.innerHTML = '<div class="rsvp-empty">No RSVPs yet. Share your invite link to start collecting responses!</div>';
        return;
      }
      var attending = rsvps.filter(function(r) { return r.status === 'attending'; }).length;
      var declined = rsvps.filter(function(r) { return r.status === 'declined'; }).length;
      var maybe = rsvps.filter(function(r) { return r.status === 'maybe'; }).length;

      var html = '<div class="rsvp-stats">'
        + '<div class="rsvp-stat attending"><div class="rsvp-stat-num">' + attending + '</div><div class="rsvp-stat-label">Attending</div></div>'
        + '<div class="rsvp-stat declined"><div class="rsvp-stat-num">' + declined + '</div><div class="rsvp-stat-label">Declined</div></div>'
        + '<div class="rsvp-stat maybe"><div class="rsvp-stat-num">' + maybe + '</div><div class="rsvp-stat-label">Maybe</div></div>'
        + '</div><ul class="rsvp-list">';
      rsvps.forEach(function(r) {
        var statusLabel = r.status === 'attending' ? 'Attending' : r.status === 'declined' ? 'Declined' : 'Maybe';
        var style = r.status === 'attending' ? 'background:#d4edda;color:#155724' : r.status === 'declined' ? 'background:#f8d7da;color:#721c24' : 'background:#fff3cd;color:#856404';
        var detail = '';
        if (r.email) detail += escapeHtml(r.email);
        if (r.phone) detail += (detail ? ' · ' : '') + escapeHtml(r.phone);
        if (r.respondedAt) detail += (detail ? ' · ' : '') + new Date(r.respondedAt).toLocaleDateString();
        html += '<li class="rsvp-item"><div class="rsvp-item-info"><div class="rsvp-item-name">' + escapeHtml(r.name) + '</div>'
          + (detail ? '<div class="rsvp-item-detail">' + detail + '</div>' : '')
          + '</div><span class="rsvp-item-status" style="' + style + '">' + statusLabel + '</span></li>';
      });
      html += '</ul>';
      body.innerHTML = html;
    }

    function closeRSVPModal() {
      document.getElementById('rsvpModal').classList.remove('active');
      document.body.style.overflow = '';
    }

    function showConfirm(title, msg, color, onConfirm) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmMsg').textContent = msg;
      var okBtn = document.getElementById('confirmOk');
      okBtn.style.background = color;
      okBtn.textContent = title;
      okBtn.onclick = function() { closeConfirm(); onConfirm(); };
      document.getElementById('confirmModal').classList.add('active');
    }
    function closeConfirm() {
      document.getElementById('confirmModal').classList.remove('active');
    }

    async function archiveEvent(eventId, btn) {
      showConfirm('Archive', 'This event will be hidden from your dashboard. You can unarchive it later.', 'var(--party-coral)', async function() {
        btn.disabled = true; btn.style.opacity = '0.5';
        try {
          await authFetch('/api/v2/events?action=update', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ eventId: eventId, status: 'Archived' })
          });
          showToast('Event archived');
          loadDashboard();
        } catch (err) { btn.disabled = false; btn.style.opacity = '1'; }
      });
    }

    async function unarchiveEvent(eventId, btn) {
      showConfirm('Unarchive', 'This event will be restored and made active again.', 'var(--mint-fizz)', async function() {
        btn.disabled = true; btn.style.opacity = '0.5';
        try {
          await authFetch('/api/v2/events?action=update', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ eventId: eventId, status: 'Published' })
          });
          showToast('Event unarchived');
          loadDashboard();
        } catch (err) { btn.disabled = false; btn.style.opacity = '1'; }
      });
    }

    function logout() {
      localStorage.removeItem('sb_access_token');
      localStorage.removeItem('sb_refresh_token');
      localStorage.removeItem('v2_user');
      window.location.href = '/v2/login/';
    }

    function showToast(message) {
      var toast = document.createElement('div');
      toast.className = 'toast'; toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 3000);
    }

    function escapeHtml(str) {
      var div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML;
    }

    function rescalePreviewIframes() {
      document.querySelectorAll('.event-card-header.has-preview').forEach(function(header) {
        var iframe = header.querySelector('iframe');
        if (!iframe) return;
        var cardWidth = header.offsetWidth;
        var scale = cardWidth / 393;
        iframe.style.transform = 'scale(' + scale + ')';
        iframe.style.marginLeft = '-' + (393 / 2) + 'px';
      });
    }
    window.addEventListener('resize', rescalePreviewIframes);

    loadDashboard();
  </script>
</body>
</html>
