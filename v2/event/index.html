<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Invite — Ryvite</title>
  <meta name="description" content="You're invited! RSVP to this event on Ryvite.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --party-coral: #E94560; --blush-pop: #FF6B6B; --midnight: #1A1A2E; --cream: #FFFAF5; }
    html, body { font-family: 'Inter', sans-serif; background: #f9f9f9; color: var(--midnight); }
    .event-container { max-width: 100%; padding: 0; }
    #themeFrame { width: 100%; border: none; min-height: 600px; display: block; position: relative; z-index: 1; }
    .invite-bg-fill { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; filter: blur(40px) saturate(1.3); transform: scale(1.2); opacity: 0.5; pointer-events: none; }
    .rsvp-section { max-width: 480px; margin: 40px auto; padding: 24px; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .rsvp-section h3 { font-size: 22px; margin-bottom: 24px; text-align: center; font-weight: 600; }
    .rsvp-form-group { margin-bottom: 18px; }
    .rsvp-form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    .rsvp-form-group .required-star { color: var(--party-coral); }
    .rsvp-form-group input, .rsvp-form-group select, .rsvp-form-group textarea {
      width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 16px; -webkit-appearance: none;
    }
    .rsvp-form-group textarea { resize: vertical; min-height: 80px; }
    .rsvp-form-group input:focus, .rsvp-form-group select:focus, .rsvp-form-group textarea:focus {
      outline: none; border-color: var(--party-coral); box-shadow: 0 0 0 3px rgba(233,69,96,0.1);
    }
    .rsvp-form-group input[type="number"] { -moz-appearance: textfield; }
    .rsvp-form-group input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .rsvp-submit {
      width: 100%; padding: 14px; background: var(--party-coral); color: white; border: none;
      border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: all 0.2s; min-height: 48px;
    }
    .rsvp-submit:hover { background: var(--blush-pop); transform: translateY(-1px); }
    .rsvp-submit:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .rsvp-success { padding: 24px; background: #d4edda; border-radius: 8px; color: #155724; text-align: center; font-weight: 600; font-size: 16px; }
    .calendar-buttons { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
    .calendar-btn {
      flex: 1; min-width: 100px; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px;
      background: white; color: var(--midnight); font-size: 14px; cursor: pointer; transition: all 0.2s;
      text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Inter', sans-serif; min-height: 48px;
    }
    .calendar-btn:hover { border-color: var(--party-coral); color: var(--party-coral); }
    .loading { text-align: center; padding: 60px 20px; font-size: 16px; color: #666; }
    .error-msg { max-width: 480px; margin: 40px auto; padding: 20px; background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 8px; color: #721c24; text-align: center; }
    .confetti-piece { position: fixed; font-size: 24px; pointer-events: none; animation: confetti-fall linear forwards; z-index: 9999; }
    @keyframes confetti-fall { 0% { opacity: 1; } 100% { transform: translateY(100vh) rotateZ(720deg); opacity: 0; } }
    .powered-by { clear: both; width: 100%; text-align: center; padding: 20px; font-size: 13px; color: #aaa; font-style: italic; }
    .powered-by a { color: #aaa; text-decoration: none; transition: color 0.2s; }
    .powered-by a:hover { color: var(--party-coral); }
    /* Photo sharing section */
    .photo-section { max-width: 480px; margin: 24px auto; padding: 24px; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .photo-section h3 { font-size: 20px; margin-bottom: 16px; text-align: center; font-weight: 600; }
    .photo-upload-area { border: 2px dashed #ddd; border-radius: 10px; padding: 32px 16px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
    .photo-upload-area:hover { border-color: var(--party-coral); background: rgba(233,69,96,0.03); }
    .photo-upload-area .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .photo-upload-area p { font-size: 14px; color: #888; }
    .photo-upload-area .upload-btn { display: inline-block; margin-top: 12px; padding: 10px 24px; background: var(--party-coral); color: white; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: background 0.2s; }
    .photo-upload-area .upload-btn:hover { background: var(--blush-pop); }
    .photo-upload-progress { display: none; margin-bottom: 16px; }
    .photo-upload-progress .progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
    .photo-upload-progress .progress-fill { height: 100%; background: var(--party-coral); border-radius: 3px; transition: width 0.3s; width: 0%; }
    .photo-upload-progress .progress-text { font-size: 13px; color: #888; margin-top: 6px; text-align: center; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .photo-grid-item { position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; cursor: pointer; }
    .photo-grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
    .photo-grid-item:hover img { transform: scale(1.05); }
    .photo-grid-item .photo-uploader { position: absolute; bottom: 0; left: 0; right: 0; padding: 4px 8px; background: linear-gradient(transparent, rgba(0,0,0,0.6)); color: white; font-size: 11px; opacity: 0; transition: opacity 0.2s; }
    .photo-grid-item:hover .photo-uploader { opacity: 1; }
    .photo-empty { text-align: center; padding: 20px; color: #aaa; font-size: 14px; }
    .photo-gallery-link { display: block; text-align: center; margin-top: 12px; font-size: 13px; color: var(--party-coral); text-decoration: none; }
    .photo-gallery-link:hover { text-decoration: underline; }
    .photo-lightbox { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .photo-lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; border-radius: 8px; }
    .photo-lightbox .lb-close { position: absolute; top: 16px; right: 16px; color: white; font-size: 32px; cursor: pointer; background: none; border: none; line-height: 1; }
    .photo-lightbox .lb-caption { color: white; margin-top: 12px; font-size: 14px; text-align: center; }
    .photo-lightbox .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 36px; cursor: pointer; background: none; border: none; padding: 16px; }
    .photo-lightbox .lb-prev { left: 8px; }
    .photo-lightbox .lb-next { right: 8px; }
    .name-prompt-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10001; display: flex; align-items: center; justify-content: center; }
    .name-prompt-modal { background: white; border-radius: 12px; padding: 24px; max-width: 340px; width: 90%; text-align: center; }
    .name-prompt-modal h4 { margin-bottom: 12px; font-size: 18px; }
    .name-prompt-modal input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 12px; font-family: 'Inter', sans-serif; }
    .name-prompt-modal input:focus { outline: none; border-color: var(--party-coral); }
    .name-prompt-modal button { width: 100%; padding: 12px; background: var(--party-coral); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; font-family: 'Inter', sans-serif; }
    .photo-count-badge { display: inline-block; background: var(--party-coral); color: white; font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
    @media (max-width: 640px) {
      .rsvp-section { margin: 20px 16px; padding: 20px; }
      .photo-section { margin: 16px 16px; padding: 20px; }
      .calendar-buttons { flex-direction: column; }
      .calendar-btn { width: 100%; }
      .photo-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
    }
  </style>
<script src="/js/meta-pixel.js"></script>
<script src="/js/ga.js"></script>
</head>
<body>
  <div class="event-container">
    <div id="loading" class="loading">Loading your invitation...</div>
    <div id="error" class="error-msg" style="display: none;"></div>
    <iframe id="themeFrame" style="display: none;"></iframe>
    <div id="rsvpSection" class="rsvp-section" style="display: none;"></div>
    <div id="photoSection" class="photo-section" style="display: none;"></div>
    <div id="poweredBy" class="powered-by" style="display: none;">Create yours free at <a href="https://www.ryvite.com/?utm_source=invite&utm_medium=footer&utm_campaign=viral" target="_blank" rel="noopener" onclick="trackViralEvent('footer_click'); if(window.RyviteGA) RyviteGA.trackEvent('viral_cta_click', {source:'footer'});">Ryvite.com</a></div>
  </div>

  <script>
    // ── Client-side error tracking (lightweight — guest page) ──
    var _clientErrorCount = 0;
    function reportClientError(info) {
      _clientErrorCount++;
      if (_clientErrorCount > 10) return;
      fetch('/api/v2/events?action=reportClientError', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          errorType: info.errorType || 'js_error',
          message: (info.message || '').slice(0, 1000),
          stack: (info.stack || '').slice(0, 2000),
          pageUrl: location.href,
          funnelStep: 'rsvp',
          component: info.component || null,
          eventId: currentEventData ? currentEventData.id : null,
          metadata: { userAgent: navigator.userAgent, viewport: innerWidth + 'x' + innerHeight }
        })
      }).catch(function() {});
    }
    window.onerror = function(msg, url, line, col, error) {
      reportClientError({ errorType: 'js_error', message: String(msg), stack: error ? error.stack : (url + ':' + line + ':' + col), component: 'global' });
    };
    window.addEventListener('unhandledrejection', function(e) {
      reportClientError({ errorType: 'unhandled_rejection', message: e.reason ? (e.reason.message || String(e.reason)) : 'Unknown', stack: e.reason ? (e.reason.stack || '') : '', component: 'global' });
    });

    let currentEventData = null;
    var _guestCssRetries = 0;
    var _MAX_GUEST_CSS_RETRIES = 2;

    // ── Viral loop tracking (fire-and-forget) ──
    function trackViralEvent(type, eventId) {
      try {
        fetch('/api/v2/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: type, eventId: eventId || (currentEventData && currentEventData.id) || null })
        }).catch(function(){});
      } catch(e) {}
    }

    // ── Ryvite SVG logo (from brand guidelines) ──
    var RYVITE_LOGO_SVG = '<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg" class="ryvite-logo">'
      + '<circle cx="30" cy="40" r="20" fill="none" stroke="#E94560" stroke-width="2"/>'
      + '<path d="M15 30 L30 42 L45 30 M15 50 L45 50" fill="none" stroke="#E94560" stroke-width="2" stroke-linecap="round"/>'
      + '<text x="65" y="50" font-family="Playfair Display, serif" font-size="32" font-weight="600" fill="currentColor">Ryvite</text>'
      + '</svg>';

    // ── Event-type confirmation messages ──
    var CONFIRMATION_MESSAGES = {
      birthday: { title: "You're on the list! &#127881;", subtitle: "Get ready to celebrate!" },
      kidsBirthday: { title: "You're on the list! &#127880;", subtitle: "It's going to be so much fun!" },
      wedding: { title: "We'll see you there! &#128141;", subtitle: "What a beautiful celebration." },
      babyShower: { title: "You're all set! &#127868;", subtitle: "Can't wait to celebrate together." },
      graduation: { title: "You're confirmed! &#127891;", subtitle: "Let's celebrate this milestone!" },
      corporate: { title: "You're confirmed &#10003;", subtitle: "Looking forward to seeing you." },
      holiday: { title: "You're on the list! &#127877;", subtitle: "Happy holidays!" },
      dinner: { title: "See you at the table! &#127860;", subtitle: "It's going to be delicious." },
      cocktail: { title: "You're on the list! &#127864;", subtitle: "Cheers to a great evening." },
      housewarming: { title: "You're coming! &#127969;", subtitle: "Can't wait to show you the new place." },
      reunion: { title: "You're in! &#129303;", subtitle: "It's going to be wonderful seeing everyone." },
      retirement: { title: "You're confirmed! &#127881;", subtitle: "Let's give them a proper send-off." },
      engagement: { title: "You're on the list! &#128141;", subtitle: "Love is in the air!" },
      default: { title: "You're on the list! &#127881;", subtitle: "Thanks for confirming." }
    };

    function getConfirmationMessage(eventType, rsvpStatus) {
      if (rsvpStatus === 'no' || rsvpStatus === 'declined') {
        return { title: "Got it &#128075;", subtitle: "Sorry you can't make it. We'll miss you!" };
      }
      if (rsvpStatus === 'maybe') {
        return { title: "Noted! &#129300;", subtitle: "We hope you can make it." };
      }
      return CONFIRMATION_MESSAGES[eventType] || CONFIRMATION_MESSAGES['default'];
    }

    // Fix double-escaped whitespace from AI model output (pre-fix DB themes)
    function sanitizeThemeText(str) {
      if (!str) return str;
      if (str.indexOf('\\n') !== -1) str = str.replace(/\\n/g, '\n');
      if (str.indexOf('\\t') !== -1) str = str.replace(/\\t/g, '\t');
      return str;
    }

    // ── Client device info for quality incident reports ──
    function getClientDeviceInfo() {
      return {
        screen_width: window.screen.width,
        screen_height: window.screen.height,
        viewport_width: window.innerWidth,
        viewport_height: window.innerHeight,
        device_pixel_ratio: window.devicePixelRatio || 1,
        platform: navigator.platform,
        user_agent: navigator.userAgent,
        touch: 'ontouchstart' in window,
        connection: navigator.connection ? {
          type: navigator.connection.effectiveType,
          downlink: navigator.connection.downlink
        } : null
      };
    }

    // ── Guest page CSS rendering check ──
    // Detects unstyled invites and attempts recovery (retry + fallback CSS injection)
    function checkGuestCssRendered(iframe, themeData) {
      try {
        var doc = iframe.contentDocument;
        if (!doc || !doc.body) return;
        var win = doc.defaultView;
        var bodyStyle = win.getComputedStyle(doc.body);
        var bodyBg = bodyStyle.backgroundColor;

        var isUnstyled = (!bodyBg || bodyBg === 'rgba(0, 0, 0, 0)' || bodyBg === 'rgb(255, 255, 255)');

        // Check deeper — child elements may be styled even if body is transparent
        if (isUnstyled) {
          var firstDiv = doc.querySelector('div, section, main, header');
          if (firstDiv) {
            var divBg = win.getComputedStyle(firstDiv).backgroundColor;
            if (divBg && divBg !== 'rgba(0, 0, 0, 0)' && divBg !== 'rgb(255, 255, 255)') {
              isUnstyled = false;
            }
          }
        }

        if (isUnstyled && themeData.css && themeData.css.trim().length > 100 && _guestCssRetries < _MAX_GUEST_CSS_RETRIES) {
          _guestCssRetries++;
          console.warn('[guest-css-check] Invite appears unstyled. Re-render attempt ' + _guestCssRetries + '/' + _MAX_GUEST_CSS_RETRIES);
          setTimeout(function() {
            iframe.srcdoc = buildGuestSrcdoc(themeData);
          }, 150);
          return;
        }

        // Last resort: inject fallback CSS directly
        if (isUnstyled && _guestCssRetries >= _MAX_GUEST_CSS_RETRIES) {
          console.error('[guest-css-check] All retries exhausted. Injecting fallback CSS.');
          try {
            var config = themeData.config || {};
            var fbBg = config.backgroundColor || '#FFFAF5';
            var fbText = config.textColor || '#1A1A2E';
            var fbFont = config.fontBody || 'Inter';
            var fallbackStyle = doc.createElement('style');
            fallbackStyle.textContent = 'html, body { background:' + fbBg + ' !important; color:' + fbText + ' !important; font-family:\'' + fbFont + '\',sans-serif !important; }';
            doc.head.appendChild(fallbackStyle);
          } catch (e) {
            console.warn('[guest-css-check] Fallback inject failed:', e.message);
          }
        }

        // If no CSS at all, try extracting from HTML <style> blocks
        if (isUnstyled && (!themeData.css || !themeData.css.trim())) {
          var styleBlocks = (themeData.html || '').match(/<style[^>]*>([\s\S]*?)<\/style>/gi);
          if (styleBlocks) {
            themeData.css = styleBlocks.map(function(s) {
              return s.replace(/<style[^>]*>/gi, '').replace(/<\/style\s*>/gi, '');
            }).join('\n');
            console.log('[guest-css-check] Recovered ' + themeData.css.length + ' chars of CSS from HTML. Re-rendering...');
            _guestCssRetries = 0;
            iframe.srcdoc = buildGuestSrcdoc(themeData);
          }
        }

        if (!isUnstyled) _guestCssRetries = 0;
      } catch (e) { /* cross-origin or other error — skip silently */ }
    }

    // ── Guest page content completeness validation ──
    function validateGuestContentCompleteness(iframe) {
      try {
        var doc = iframe.contentDocument;
        if (!doc || !doc.body) return { valid: true, missing: [], cssIssues: [] };

        var missing = [];
        var cssIssues = [];
        var win = doc.defaultView;

        // 1. Details slot or legacy data-fields
        var detailsSlot = doc.querySelector('.details-slot');
        if (!detailsSlot || detailsSlot.children.length === 0) {
          var legacyDate = doc.querySelector('[data-field="datetime"]');
          var legacyLoc = doc.querySelector('[data-field="location"]');
          if (!legacyDate && !legacyLoc) missing.push('details');
        }

        // 2. Title
        var titleEl = doc.querySelector('[data-field="title"]');
        if (!titleEl || !titleEl.textContent.trim()) missing.push('title');

        // 3. Visible text content (>30 chars)
        var bodyText = doc.body.textContent || '';
        if (bodyText.replace(/\s+/g, ' ').trim().length < 30) missing.push('text');

        // 4. Key element visibility checks
        if (titleEl) {
          var titleStyle = win.getComputedStyle(titleEl);
          if (parseFloat(titleStyle.opacity) < 0.1) cssIssues.push('invisible_title');
          if (titleStyle.display === 'none') cssIssues.push('hidden_title');
          if (titleStyle.visibility === 'hidden') cssIssues.push('hidden_title');
        }
        if (detailsSlot) {
          var detailsStyle = win.getComputedStyle(detailsSlot);
          if (detailsSlot.offsetHeight === 0 && detailsSlot.children.length > 0) cssIssues.push('tiny_details');
          if (detailsStyle.display === 'none') cssIssues.push('hidden_details');
        }

        var valid = missing.length === 0 && cssIssues.length === 0;
        if (!valid) {
          console.warn('[guest-content-check] Issues found — missing:', missing.join(', '), 'css:', cssIssues.join(', '));
        }
        return { valid: valid, missing: missing, cssIssues: cssIssues };
      } catch (e) {
        return { valid: true, missing: [], cssIssues: [] }; // Fail open
      }
    }

    // ── Report guest-side quality incident (no auth required, fire-and-forget) ──
    function reportGuestIncident(eventId, slug, missing, cssIssues, themeData) {
      try {
        fetch('/api/v2/quality-monitor?action=reportGuestIncident', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            eventId: eventId,
            slug: slug || '',
            triggerType: 'guest_broken_render',
            triggerData: { missing: missing, cssIssues: cssIssues },
            themeSnapshot: themeData ? {
              htmlLength: (themeData.html || '').length,
              cssLength: (themeData.css || '').length,
              hasConfig: !!themeData.config
            } : null,
            clientDeviceInfo: getClientDeviceInfo()
          })
        }).catch(function() {});
      } catch (e) { /* silent */ }
    }

    // ── Build guest srcdoc with proper CSS ordering ──
    function buildGuestSrcdoc(themeData) {
      var config = themeData.config || {};
      var css = themeData.css || '';
      var html = themeData.html || '';

      // CSS failsafe: extract from HTML if missing
      if (!css.trim() && html) {
        var styleBlocks = html.match(/<style[^>]*>([\s\S]*?)<\/style>/gi);
        if (styleBlocks) {
          css = styleBlocks.map(function(s) {
            return s.replace(/<style[^>]*>/gi, '').replace(/<\/style\s*>/gi, '');
          }).join('\n');
        }
      }

      var fontsImport = config.googleFontsImport || '';
      // Convert @import to <link> tags — far more reliable for font loading
      var fontsLink = '';
      if (fontsImport) {
        var fontUrlMatch = fontsImport.match(/url\(['"]?([^'"\)]+)['"]?\)/);
        var fontUrl = fontUrlMatch ? fontUrlMatch[1] : (fontsImport.startsWith('http') ? fontsImport : '');
        if (fontUrl) {
          fontsLink = '<link rel="preconnect" href="https://fonts.googleapis.com">'
            + '<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>'
            + '<link rel="stylesheet" href="' + fontUrl + '">';
        }
      }

      // Strip stray @import from CSS body
      var cleanedCss = sanitizeThemeText(css);
      var strayImports = cleanedCss.match(/@import\s+url\([^)]+\);?\s*/g);
      if (strayImports) {
        strayImports.forEach(function(imp) { cleanedCss = cleanedCss.replace(imp, ''); });
        if (!fontsLink) {
          var strayUrl = strayImports[0].match(/url\(['"]?([^'"\)]+)['"]?\)/);
          if (strayUrl) {
            fontsLink = '<link rel="preconnect" href="https://fonts.googleapis.com">'
              + '<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>'
              + '<link rel="stylesheet" href="' + strayUrl[1] + '">';
          }
        }
      }

      // Fallback CSS from config colors
      var fallbackBg = config.backgroundColor || '#FFFAF5';
      var fallbackText = config.textColor || '#1A1A2E';
      var fallbackFont = config.fontBody || 'Inter';
      var fallbackCSS = 'html, body { background:' + fallbackBg + '; color:' + fallbackText + '; font-family:\'' + fallbackFont + '\',sans-serif; }';

      // Strip document-level tags
      var themeHtml = sanitizeThemeText(html)
        .replace(/<!DOCTYPE[^>]*>/gi, '')
        .replace(/<html\b[^>]*>/gi, '').replace(/<\/html\s*>/gi, '')
        .replace(/<head(?:\s[^>]*)?>[\s\S]*?<\/head\s*>/gi, '')
        .replace(/<body\b[^>]*>/gi, '').replace(/<\/body\s*>/gi, '')
        .replace(/<script\b[\s\S]*?<\/script\s*>/gi, '');

      return '<!DOCTYPE html><html><head><meta charset="UTF-8">'
        + '<meta name="viewport" content="width=device-width, initial-scale=1.0">'
        + fontsLink
        + '<style>* { margin:0; padding:0; box-sizing:border-box; } html, body { background: #f9f9f9; } ' + fallbackCSS + '</style>'
        + '<style>' + cleanedCss.replace(/<\/style/gi, '<\\/style') + '</style>'
        + '</head><body>' + themeHtml + '</body></html>';
    }

    function buildEventDetailsHtml(event) {
      var items = [];
      if (event.event_date || event.eventDate) {
        var dateStr = event.event_date || event.eventDate;
        var startDate = new Date(dateStr);
        var endDateStr = event.end_date || event.endDate;
        var formatted = startDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        var timeStr = startDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        if (endDateStr) {
          var endDate = new Date(endDateStr);
          timeStr += ' \u2013 ' + endDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }
        items.push({ icon: '&#128197;', label: 'Date', value: formatted + '<br>' + timeStr });
      }
      var locName = event.location_name || event.locationName || '';
      var locAddr = event.location_address || event.locationAddress || '';
      if (locName || locAddr) {
        var loc = [locName, locAddr].filter(Boolean).join('<br>');
        items.push({ icon: '&#128205;', label: 'Location', value: loc });
      }
      var dressCode = event.dress_code || event.dressCode || '';
      if (dressCode) {
        items.push({ icon: '&#128087;', label: 'Dress Code', value: dressCode });
      }
      return items.map(function(item) {
        return '<div class="detail-item">'
          + '<div class="detail-icon">' + item.icon + '</div>'
          + '<div class="detail-text"><div class="detail-label">' + item.label + '</div>'
          + '<div class="detail-value">' + item.value + '</div></div>'
          + '</div>';
      }).join('');
    }

    var invitedGuest = null; // Set when guest arrives via personalized invite link
    var guestId = ''; // Guest ID from URL ?gid= parameter

    async function loadEvent() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      var eventId = params.get('eid');
      guestId = params.get('gid') || '';
      var isPreview = params.get('preview') === 'true';
      var viewMode = params.get('view') || 'invite';

      // Support clean URLs: /v2/event/my-slug
      if (!slug && !eventId) {
        var pathParts = window.location.pathname.split('/').filter(Boolean);
        // URL: /v2/event/some-slug → pathParts = ['v2', 'event', 'some-slug']
        if (pathParts.length >= 3 && pathParts[0] === 'v2' && pathParts[1] === 'event') {
          slug = decodeURIComponent(pathParts[2]);
        }
      }

      if (!slug && !eventId) { showError('No event specified'); return; }

      try {
        var queryParams = slug ? 'slug=' + encodeURIComponent(slug) : 'eventId=' + encodeURIComponent(eventId);

        // Try public endpoint first (works for published events, no auth needed)
        // In preview mode, pass preview=true so the API returns draft events too
        var previewParam = isPreview ? '&preview=true' : '';
        var res = await fetch('/api/v2/events?action=getPublic&' + queryParams + previewParam);
        var result = await res.json();

        // Preview mode fallback: if getPublic fails, try authenticated get
        if (isPreview && (!result.success || !result.event)) {
          var token = localStorage.getItem('sb_access_token');
          if (token) {
            res = await fetch('/api/v2/events?action=get&' + queryParams, {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            result = await res.json();
          }
        }

        if (!result.success || !result.event) { showError('Event not found'); return; }

        currentEventData = result.event;
        document.title = result.event.title + ' — Ryvite';

        // Skip tracking in preview mode
        if (!isPreview) {
          // Track ViewContent with Meta Pixel
          if (window.RyvitePixel) {
            RyvitePixel.trackEvent('ViewContent', {
              content_type: 'event_invite',
              content_name: result.event.title,
              content_ids: [result.event.id],
              content_category: result.event.eventType || 'event'
            });
          }
          if (window.RyviteGA) {
            RyviteGA.trackEvent('view_invite', {
              event_id: result.event.id,
              event_title: result.event.title,
              event_type: result.event.eventType || 'event'
            });
          }

          // Track invite page view for viral loop reporting
          trackViralEvent('page_view', result.event.id);
        }

        // If guest arrived via personalized invite link, look up their info
        if (guestId && !isPreview) {
          try {
            var gRes = await fetch('/api/v2/events?action=getGuest&guestId=' + encodeURIComponent(guestId) + '&eventId=' + encodeURIComponent(result.event.id));
            var gData = await gRes.json();
            if (gData.success && gData.guest) {
              invitedGuest = gData.guest;
              // Pre-fill photo uploader name from invited guest
              if (gData.guest.name && !photoUploaderName) {
                photoUploaderName = gData.guest.name;
                localStorage.setItem('ryvite_photo_name', gData.guest.name);
              }
            }
          } catch (e) { /* fall back to walk-in mode */ }
        }

        if (result.event.themeHtml && result.event.themeCss) {
          var themeData = {
            html: result.event.themeHtml,
            css: result.event.themeCss,
            config: result.event.themeConfig || {}
          };
          var iframe = document.getElementById('themeFrame');
          iframe.srcdoc = buildGuestSrcdoc(themeData);
          iframe.style.display = 'block';

          // Add blurred background fill from theme colors (helps legacy 393px invites on desktop)
          var bgColor = (result.event.themeConfig && result.event.themeConfig.backgroundColor) || '';
          if (bgColor) {
            var existingBgFill = document.querySelector('.invite-bg-fill');
            if (!existingBgFill) {
              var bgFill = document.createElement('div');
              bgFill.className = 'invite-bg-fill';
              bgFill.style.background = bgColor;
              iframe.parentNode.insertBefore(bgFill, iframe);
            }
          }

          iframe.onload = function() {
            try {
              var win = iframe.contentWindow;
              // Delay one frame so styles are fully resolved before checking
              var runChecks = function() {
                try {
                  iframe.style.height = Math.max(iframe.contentDocument.body.scrollHeight + 40, 600) + 'px';
                  // Inject event details into .details-slot for new themes
                  var doc = iframe.contentDocument;
                  var detailsSlot = doc.querySelector('.details-slot');
                  if (detailsSlot) {
                    detailsSlot.innerHTML = buildEventDetailsHtml(result.event);
                  }

                  // Override title data-field with DB value (AI may have generated a different title)
                  var evTitle = result.event.title;
                  if (evTitle) {
                    var titleEl = doc.querySelector('[data-field="title"]');
                    if (titleEl) {
                      var titleWalker = titleEl;
                      while (titleWalker.firstElementChild) titleWalker = titleWalker.firstElementChild;
                      var origColor = '';
                      try { origColor = iframe.contentWindow.getComputedStyle(titleWalker).color; } catch(e) {}
                      titleEl.innerHTML = evTitle;
                      if (origColor) titleEl.style.setProperty('color', origColor, 'important');
                    }
                  }

                  // Override tagline/subtitle data-field if present
                  var evTagline = result.event.tagline || result.event.description || '';
                  if (evTagline) {
                    var taglineEl = doc.querySelector('[data-field="tagline"]') || doc.querySelector('[data-field="subtitle"]');
                    if (taglineEl) {
                      taglineEl.textContent = evTagline;
                    }
                  }

                  // Inject RSVP form into .rsvp-slot inside the iframe
                  renderRSVPForm(result.event);

                  // Preview mode: show thank-you page or disable form
                  if (isPreview) {
                    if (viewMode === 'thankyou') {
                      setTimeout(function() { showThankYouPage('Guest', 'yes'); }, 100);
                    } else {
                      // Disable submit button in preview
                      var submitBtn = iframe.contentDocument.querySelector('#rsvpSubmitBtn');
                      if (submitBtn) {
                        submitBtn.disabled = true;
                        submitBtn.style.opacity = '0.7';
                        submitBtn.style.cursor = 'default';
                      }
                    }
                  }

                  // ── CSS rendering check (retry on failure) ──
                  checkGuestCssRendered(iframe, themeData);

                  // ── Content completeness check (after details injection) ──
                  setTimeout(function() {
                    var validation = validateGuestContentCompleteness(iframe);
                    if (!validation.valid) {
                      // Silently report incident — don't break guest experience
                      var eventSlug = result.event.slug || slug || '';
                      reportGuestIncident(result.event.id, eventSlug, validation.missing, validation.cssIssues, themeData);

                      // If theme is completely empty, show fallback event card
                      if (validation.missing.indexOf('text') !== -1 && !iframe.contentDocument.body.textContent.trim()) {
                        showFallbackEventCard(result.event);
                      }
                    }
                  }, 300);
                } catch(e) {}
              };

              if (win && win.requestAnimationFrame) {
                win.requestAnimationFrame(runChecks);
              } else {
                setTimeout(runChecks, 50);
              }
            } catch(e) {}
          };
        } else if (result.event.title) {
          // No theme at all — show fallback event card
          showFallbackEventCard(result.event);
          // No iframe, render RSVP form in external section
          renderRSVPForm(result.event);
        }

        // RSVP form is injected into iframe's .rsvp-slot in the onload handler (or external section for fallback)
        // Photos section removed from invite page — photos are on the dedicated /photos page
        document.getElementById('loading').style.display = 'none';
        if (!isPreview) {
          document.getElementById('poweredBy').style.display = 'block';
        }
      } catch (err) { console.error(err); showError('Error loading event'); }
    }

    var rsvpFormEvent = null; // Store event data for form use
    var rsvpInjectedInIframe = false;

    function buildRSVPFormHtml(event, isDarkBg) {
      var customFields = event.customFields || [];
      // Explicit colors — NEVER rely on inherit for contrast safety
      var textColor = isDarkBg ? '#FFFFFF' : '#1A1A1A';
      var borderColor = isDarkBg ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.15)';
      var inputBg = isDarkBg ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.04)';
      var inputStyle = 'width:100%;padding:12px 14px;border:1px solid ' + borderColor + ';border-radius:8px;font-size:16px;font-family:Inter,sans-serif;-webkit-appearance:none;background:' + inputBg + ';color:' + textColor + ';';
      var labelStyle = 'display:block;margin-bottom:8px;font-weight:600;font-size:14px;color:' + textColor + ';';

      var html = '<div id="rsvpForm" style="color:' + textColor + ';">';

      if (invitedGuest) {
        html += '<div class="invite-welcome" style="padding:12px 16px;margin-bottom:16px;background:' + (isDarkBg ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.03)') + ';border-radius:8px;font-size:14px;color:' + textColor + ';">'
          + 'Welcome, <strong>' + escapeHtml(invitedGuest.name) + '</strong>! Just confirm your RSVP below.'
          + '</div>';
      }

      html += '<div class="rsvp-form-group" style="margin-bottom:14px;">'
        + '<label for="rsvpName" style="' + labelStyle + '">Name <span style="color:#E94560;">*</span></label>'
        + '<input type="text" id="rsvpName" placeholder="Your name" required style="' + inputStyle + '"'
        + (invitedGuest ? ' value="' + escapeHtml(invitedGuest.name) + '"' : '') + '>'
        + '</div>';

      if (!invitedGuest) {
        html += '<div class="rsvp-form-group" style="margin-bottom:14px;">'
          + '<label for="rsvpEmail" style="' + labelStyle + '">Email</label>'
          + '<input type="email" id="rsvpEmail" placeholder="your@email.com" style="' + inputStyle + '">'
          + '</div>';
        html += '<div class="rsvp-form-group" style="margin-bottom:14px;">'
          + '<label for="rsvpPhone" style="' + labelStyle + '">Phone</label>'
          + '<input type="tel" id="rsvpPhone" placeholder="(555) 123-4567" style="' + inputStyle + '">'
          + '</div>';
      }

      html += '<div class="rsvp-form-group" style="margin-bottom:14px;">'
        + '<label for="rsvpStatus" style="' + labelStyle + '">RSVP Status <span style="color:#E94560;">*</span></label>'
        + '<select id="rsvpStatus" required style="' + inputStyle + 'cursor:pointer;">'
        + '<option value="">Select...</option>'
        + '<option value="yes">Yes, I\'ll be there!</option>'
        + '<option value="no">No, sorry</option>'
        + '<option value="maybe">Maybe</option>'
        + '</select></div>';

      customFields.forEach(function(field) {
        if (field.key === 'email' || field.key === 'phone') return;
        html += renderFieldWithColors(field, labelStyle, inputStyle, textColor);
      });

      html += '<button class="rsvp-submit" id="rsvpSubmitBtn" style="width:100%;padding:14px 24px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;background:#E94560;color:#FFFFFF;font-family:Inter,sans-serif;min-height:48px;">Submit RSVP</button>';
      html += '</div>';
      return html;
    }

    // Render a custom field with explicit color styles
    function renderFieldWithColors(field, labelStyle, inputStyle, textColor) {
      var id = 'custom_' + field.key;
      var reqStar = field.required ? ' <span style="color:#E94560;">*</span>' : '';
      var html = '<div class="rsvp-form-group" style="margin-bottom:14px;">';
      if (field.fieldType === 'checkbox') {
        html += '<label style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;cursor:pointer;color:' + textColor + ';">'
          + '<input type="checkbox" id="' + id + '" style="width:18px;height:18px;accent-color:#E94560;">'
          + escapeHtml(field.label) + reqStar + '</label>';
      } else {
        html += '<label for="' + id + '" style="' + labelStyle + '">' + escapeHtml(field.label) + reqStar + '</label>';
        if (field.fieldType === 'select' && field.options && field.options.length > 0) {
          html += '<select id="' + id + '"' + (field.required ? ' required' : '') + ' style="' + inputStyle + 'cursor:pointer;">';
          html += '<option value="">Select...</option>';
          field.options.forEach(function(opt) { html += '<option value="' + escapeHtml(opt) + '">' + escapeHtml(opt) + '</option>'; });
          html += '</select>';
        } else if (field.fieldType === 'textarea') {
          html += '<textarea id="' + id + '"' + (field.required ? ' required' : '') + ' placeholder="' + escapeHtml(field.placeholder || '') + '" style="' + inputStyle + 'min-height:80px;resize:vertical;"></textarea>';
        } else {
          var inputType = field.fieldType === 'number' ? 'number' : field.fieldType === 'email' ? 'email' : field.fieldType === 'phone' || field.fieldType === 'tel' ? 'tel' : 'text';
          html += '<input type="' + inputType + '" id="' + id + '"' + (field.required ? ' required' : '') + ' placeholder="' + escapeHtml(field.placeholder || '') + '" style="' + inputStyle + '">';
        }
      }
      html += '</div>';
      return html;
    }

    // Detect background color by walking up DOM ancestors (handles gradients too)
    function detectBgColor(el, win) {
      var node = el;
      while (node && node.nodeType === 1) {
        try {
          var styles = win.getComputedStyle(node);
          var bg = styles.backgroundColor;
          if (bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent') {
            var m = bg.match(/\d+/g);
            if (m && m.length >= 3) return [+m[0], +m[1], +m[2]];
          }
          var bgImg = styles.backgroundImage;
          if (bgImg && bgImg !== 'none') {
            var gradColors = bgImg.match(/rgb[a]?\([^)]+\)/g);
            if (gradColors) { var gm = gradColors[0].match(/\d+/g); if (gm && gm.length >= 3) return [+gm[0], +gm[1], +gm[2]]; }
          }
        } catch (e) {}
        node = node.parentElement;
      }
      return [255, 255, 255];
    }

    function bgIsDark(rgb) {
      var a = rgb.map(function(v) { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); });
      return (0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2]) < 0.35;
    }

    function renderRSVPForm(event) {
      rsvpFormEvent = event;

      // Try to inject into iframe's .rsvp-slot
      var iframe = document.getElementById('themeFrame');
      if (iframe && iframe.contentDocument) {
        var rsvpSlot = iframe.contentDocument.querySelector('.rsvp-slot');
        if (rsvpSlot) {
          // Detect background BEFORE building form — bake correct colors into HTML
          var ifrWin = iframe.contentWindow || iframe.contentDocument.defaultView;
          var bgRgb = detectBgColor(rsvpSlot, ifrWin);
          var isDark = bgIsDark(bgRgb);
          var formHtml = buildRSVPFormHtml(event, isDark);
          rsvpSlot.innerHTML = formHtml;
          rsvpInjectedInIframe = true;
          // Attach submit handler inside iframe
          var submitBtn = rsvpSlot.querySelector('#rsvpSubmitBtn');
          if (submitBtn) {
            submitBtn.addEventListener('click', function(e) { e.preventDefault(); submitRSVP(); });
          }
          // Re-measure iframe height after form injection
          setTimeout(function() {
            iframe.style.height = Math.max(iframe.contentDocument.body.scrollHeight + 40, 600) + 'px';
          }, 100);
          // Calendar links are shown on thank you page after RSVP, not on invite page
          return;
        }
      }

      // Fallback: render in external section (white background = light mode)
      var formHtml = buildRSVPFormHtml(event, false);
      var rsvpSection = document.getElementById('rsvpSection');
      rsvpSection.innerHTML = '<h3>RSVP</h3>' + formHtml;
      rsvpSection.style.display = 'block';
    }

    // Helper to get RSVP form values from either iframe or external section
    function getRsvpFormDoc() {
      if (rsvpInjectedInIframe) {
        var iframe = document.getElementById('themeFrame');
        if (iframe && iframe.contentDocument) return iframe.contentDocument;
      }
      return document;
    }

    function renderField(field) {
      var id = 'custom_' + field.key;
      var reqStar = field.required ? ' <span class="required-star">*</span>' : '';
      var reqAttr = field.required ? ' required' : '';
      var placeholder = field.placeholder || '';
      var html = '<div class="rsvp-form-group">';
      html += '<label for="' + id + '">' + escapeHtml(field.label) + reqStar + '</label>';

      if (field.type === 'checkbox') {
        html += '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;">'
          + '<input type="checkbox" id="' + id + '"' + reqAttr + ' style="width:18px;height:18px;">'
          + '<span>' + escapeHtml(placeholder || field.label) + '</span></label>';
      } else if (field.type === 'select' && field.options && field.options.length > 0) {
        html += '<select id="' + id + '"' + reqAttr + '><option value="">Select...</option>';
        field.options.forEach(function(opt) {
          html += '<option value="' + escapeHtml(opt) + '">' + escapeHtml(opt) + '</option>';
        });
        html += '</select>';
      } else if (field.type === 'textarea') {
        html += '<textarea id="' + id + '" placeholder="' + escapeHtml(placeholder) + '"' + reqAttr + '></textarea>';
      } else if (field.type === 'number') {
        html += '<input type="number" id="' + id + '" placeholder="' + escapeHtml(placeholder) + '" min="0"' + reqAttr + '>';
      } else if (field.type === 'email') {
        html += '<input type="email" id="' + id + '" placeholder="' + escapeHtml(placeholder || 'your@email.com') + '"' + reqAttr + '>';
      } else if (field.type === 'phone' || field.type === 'tel') {
        html += '<input type="tel" id="' + id + '" placeholder="' + escapeHtml(placeholder || '(555) 123-4567') + '"' + reqAttr + '>';
      } else {
        html += '<input type="text" id="' + id + '" placeholder="' + escapeHtml(placeholder) + '"' + reqAttr + '>';
      }
      html += '</div>';
      return html;
    }

    async function submitRSVP() {
      var formDoc = getRsvpFormDoc();
      var name = formDoc.getElementById('rsvpName').value.trim();
      var status = formDoc.getElementById('rsvpStatus').value;
      if (!name || !status) { alert('Please fill in your name and RSVP status'); return; }

      // Collect email and phone (only shown for walk-in visitors)
      var emailEl = formDoc.getElementById('rsvpEmail');
      var phoneEl = formDoc.getElementById('rsvpPhone');
      var email = emailEl ? emailEl.value.trim() : '';
      var phone = phoneEl ? phoneEl.value.trim() : '';

      // Collect custom field values
      var customFields = currentEventData.customFields || [];
      var responseData = {};
      var missingRequired = false;

      customFields.forEach(function(field) {
        if (field.key === 'email' || field.key === 'phone') return;
        var el = formDoc.getElementById('custom_' + field.key);
        if (!el) return;
        var val;
        if (field.type === 'checkbox') {
          val = el.checked ? 'Yes' : '';
          if (field.required && !el.checked) { missingRequired = true; }
        } else {
          val = el.value.trim();
          if (field.required && !val) { missingRequired = true; }
        }
        if (val) responseData[field.key] = val;
      });

      if (missingRequired) { alert('Please fill in all required fields'); return; }

      // Check plus_ones
      var plusOnes = responseData.plus_ones || responseData.plusOnes || 0;
      if (typeof plusOnes === 'string') plusOnes = parseInt(plusOnes, 10) || 0;

      var btn = formDoc.getElementById('rsvpSubmitBtn');
      btn.disabled = true;
      // Show loading pun from theme config if available
      var loadingPun = (currentEventData.themeConfig || {}).loadingPun || 'Submitting...';
      btn.textContent = loadingPun;

      // Also show a loading overlay inside the RSVP form
      var rsvpForm = document.getElementById('rsvpForm');
      var loadingOverlay = document.createElement('div');
      loadingOverlay.id = 'rsvpLoadingOverlay';
      loadingOverlay.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;border-radius:12px;';
      var primaryColor = (currentEventData.themeConfig || {}).primaryColor || '#333';
      loadingOverlay.innerHTML = '<div style="width:32px;height:32px;border:3px solid #eee;border-top-color:' + primaryColor + ';border-radius:50%;animation:rsvpSpin 0.8s linear infinite;margin-bottom:16px;"></div>'
        + '<div style="font-size:16px;font-weight:600;color:' + primaryColor + ';text-align:center;padding:0 20px;">' + escapeHtml(loadingPun) + '</div>';
      rsvpForm.style.position = 'relative';
      rsvpForm.appendChild(loadingOverlay);

      // Add spin animation if not present
      if (!document.getElementById('rsvpSpinStyle')) {
        var spinStyle = document.createElement('style');
        spinStyle.id = 'rsvpSpinStyle';
        spinStyle.textContent = '@keyframes rsvpSpin { to { transform: rotate(360deg); } }';
        document.head.appendChild(spinStyle);
      }

      try {
        // Generate Meta event ID for dedup between pixel and CAPI
        var metaEventId = window.RyvitePixel ? RyvitePixel.generateEventId() : '';
        var metaCtx = window.RyvitePixel ? RyvitePixel.getFbCookies() : {};

        var rsvpBody = {
            eventId: currentEventData.id,
            name: name,
            email: email,
            phone: phone,
            status: status,
            plusOnes: plusOnes,
            responseData: responseData,
            metaEventId: metaEventId,
            fbp: metaCtx.fbp || '',
            fbc: metaCtx.fbc || ''
        };
        // Include guestId for invited guests — triggers UPDATE instead of INSERT
        if (guestId && invitedGuest) rsvpBody.guestId = guestId;

        var res = await fetch('/api/v2/events?action=rsvp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(rsvpBody)
        });
        var result = await res.json();
        if (result.success) {
          // Track RSVP as Schedule + Lead with Meta Pixel
          if (window.RyvitePixel) {
            RyvitePixel.trackEvent('Schedule', {
              content_name: currentEventData.title,
              content_ids: [currentEventData.id],
              content_category: currentEventData.eventType || 'event'
            }, { em: email, ph: phone, fn: name }, metaEventId);
            RyvitePixel.trackEvent('Lead', {
              content_name: currentEventData.title,
              content_category: 'rsvp'
            });
          }
          if (window.RyviteGA) {
            RyviteGA.trackEvent('rsvp_submitted', {
              event_id: currentEventData.id,
              event_title: currentEventData.title,
              rsvp_status: status
            });
          }
          showThankYouPage(name, status);
          triggerConfetti();
        } else { alert(result.error || 'Error submitting RSVP. Please try again.'); }
      } catch (err) { alert('Error submitting RSVP. Please try again.'); }
      finally {
        btn.disabled = false; btn.textContent = 'Submit RSVP';
        var overlay = document.getElementById('rsvpLoadingOverlay');
        if (overlay) overlay.remove();

        + '.detail-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }'
        + '.detail-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6; margin-bottom: 4px; }'
        + '.detail-value { font-size: 15px; line-height: 1.4; }'
        + '</style></head><body>'
        + '<div class="card">'
        + '<h1 class="title">' + (event.title || 'Event').replace(/</g, '&lt;') + '</h1>'
        + '<div class="details">' + detailsHtml + '</div>'
        + '</div></body></html>';
      iframe.srcdoc = fallbackHtml;
      iframe.style.display = 'block';
      iframe.onload = function() {
        try { iframe.style.height = Math.max(iframe.contentDocument.body.scrollHeight + 40, 400) + 'px'; } catch(e) {}
      };
    }

    function showError(msg) { document.getElementById('error').textContent = msg; document.getElementById('error').style.display = 'block'; document.getElementById('loading').style.display = 'none'; }
    function escapeHtml(str) { var div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }

    // ── Photo sharing ──
    var photoUploaderName = localStorage.getItem('ryvite_photo_name') || '';
    var allPhotos = [];
    var lightboxIndex = 0;

    function initPhotoSection() {
      if (!currentEventData || !currentEventData.photosEnabled) return;
      var section = document.getElementById('photoSection');
      section.innerHTML = '<h3>Event Photos</h3>'
        + '<div class="photo-upload-area" id="photoDropZone" onclick="document.getElementById(\'photoFileInput\').click()">'
        + '<div class="upload-icon">📸</div>'
        + '<p>Share your photos from the event</p>'
        + '<span class="upload-btn">Add Photos</span>'
        + '<input type="file" id="photoFileInput" accept="image/*" multiple style="display:none" onchange="handlePhotoSelect(this.files)">'
        + '</div>'
        + '<div class="photo-upload-progress" id="photoProgress">'
        + '<div class="progress-bar"><div class="progress-fill" id="photoProgressFill"></div></div>'
        + '<div class="progress-text" id="photoProgressText"></div>'
        + '</div>'
        + '<div id="photoGrid" class="photo-grid"></div>'
        + '<div id="photoEmpty" class="photo-empty" style="display:none">No photos yet — be the first to share!</div>'
        + '<a class="photo-gallery-link" id="photoGalleryLink" href="/v2/event/' + (currentEventData.slug || '') + '/photos" style="display:none">View full gallery →</a>';
      section.style.display = 'block';
      loadPhotos();
    }

    async function loadPhotos() {
      try {
        var res = await fetch('/api/v2/photos?action=list&eventId=' + encodeURIComponent(currentEventData.id) + '&limit=12');
        var data = await res.json();
        allPhotos = data.photos || [];
        renderPhotoGrid();
        if (data.total > 12) {
          document.getElementById('photoGalleryLink').style.display = 'block';
        }
      } catch(e) { console.error('Failed to load photos:', e); }
    }

    function renderPhotoGrid() {
      var grid = document.getElementById('photoGrid');
      var empty = document.getElementById('photoEmpty');
      if (!allPhotos.length) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      grid.innerHTML = allPhotos.map(function(p, i) {
        return '<div class="photo-grid-item" onclick="openLightbox(' + i + ')">'
          + '<img src="' + escapeHtml(p.photo_url) + '" alt="Event photo" loading="lazy">'
          + '<div class="photo-uploader">' + escapeHtml(p.uploader_name) + '</div>'
          + '</div>';
      }).join('');
      // Show gallery link if photos exist
      if (allPhotos.length > 0) {
        document.getElementById('photoGalleryLink').style.display = 'block';
      }
    }

    function openLightbox(index) {
      lightboxIndex = index;
      var p = allPhotos[index];
      if (!p) return;
      var lb = document.createElement('div');
      lb.className = 'photo-lightbox';
      lb.id = 'photoLightbox';
      lb.innerHTML = '<button class="lb-close" onclick="closeLightbox()">&times;</button>'
        + (allPhotos.length > 1 ? '<button class="lb-nav lb-prev" onclick="navLightbox(-1)">‹</button>' : '')
        + '<img src="' + escapeHtml(p.photo_url) + '" id="lbImage">'
        + '<div class="lb-caption" id="lbCaption">' + escapeHtml(p.uploader_name) + (p.caption ? ' — ' + escapeHtml(p.caption) : '') + '</div>'
        + (allPhotos.length > 1 ? '<button class="lb-nav lb-next" onclick="navLightbox(1)">›</button>' : '');
      lb.addEventListener('click', function(e) { if (e.target === lb) closeLightbox(); });
      document.body.appendChild(lb);
    }

    function closeLightbox() {
      var lb = document.getElementById('photoLightbox');
      if (lb) lb.remove();
    }

    function navLightbox(dir) {
      lightboxIndex = (lightboxIndex + dir + allPhotos.length) % allPhotos.length;
      var p = allPhotos[lightboxIndex];
      document.getElementById('lbImage').src = p.photo_url;
      document.getElementById('lbCaption').textContent = p.uploader_name + (p.caption ? ' — ' + p.caption : '');
    }

    function handlePhotoSelect(files) {
      if (!files || !files.length) return;
      if (!photoUploaderName) {
        promptForName(function() { uploadPhotos(Array.from(files)); });
        return;
      }
      uploadPhotos(Array.from(files));
    }

    function promptForName(callback) {
      var overlay = document.createElement('div');
      overlay.className = 'name-prompt-overlay';
      overlay.id = 'namePromptOverlay';
      overlay.innerHTML = '<div class="name-prompt-modal">'
        + '<h4>What\'s your name?</h4>'
        + '<input type="text" id="namePromptInput" placeholder="Your name" maxlength="100" autofocus>'
        + '<button onclick="submitNamePrompt()">Continue</button>'
        + '</div>';
      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
      // Store callback
      window._photoNameCallback = callback;
      setTimeout(function() { document.getElementById('namePromptInput').focus(); }, 100);
      // Enter key
      document.getElementById('namePromptInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') submitNamePrompt();
      });
    }

    function submitNamePrompt() {
      var name = (document.getElementById('namePromptInput').value || '').trim();
      if (!name) return;
      photoUploaderName = name;
      localStorage.setItem('ryvite_photo_name', name);
      var overlay = document.getElementById('namePromptOverlay');
      if (overlay) overlay.remove();
      if (window._photoNameCallback) {
        window._photoNameCallback();
        window._photoNameCallback = null;
      }
    }

    async function uploadPhotos(files) {
      var progress = document.getElementById('photoProgress');
      var fill = document.getElementById('photoProgressFill');
      var text = document.getElementById('photoProgressText');
      progress.style.display = 'block';

      for (var i = 0; i < files.length; i++) {
        var pct = Math.round((i / files.length) * 100);
        fill.style.width = pct + '%';
        text.textContent = 'Uploading ' + (i + 1) + ' of ' + files.length + '...';

        try {
          var resized = await resizeImage(files[i], 1600, 0.8);
          var res = await fetch('/api/v2/photos?action=upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              eventId: currentEventData.id,
              uploaderName: photoUploaderName,
              base64: resized.base64,
              width: resized.width,
              height: resized.height
            })
          });
          var data = await res.json();
          if (data.success) {
            allPhotos.unshift({
              id: data.photoId,
              photo_url: data.url,
              uploader_name: photoUploaderName,
              caption: null,
              created_at: new Date().toISOString()
            });
            if (window.RyviteGA) {
              RyviteGA.trackEvent('photo_uploaded', { event_id: currentEventData.id });
            }
          }
        } catch(e) { console.error('Upload error:', e); }
      }

      fill.style.width = '100%';
      text.textContent = 'Done!';
      setTimeout(function() { progress.style.display = 'none'; fill.style.width = '0%'; }, 1500);
      renderPhotoGrid();
      // Reset file input
      document.getElementById('photoFileInput').value = '';
    }

    function resizeImage(file, maxDim, quality) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
              else { w = Math.round(w * maxDim / h); h = maxDim; }
            }
            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            var dataUrl = canvas.toDataURL('image/jpeg', quality);
            var base64 = dataUrl.split(',')[1];
            resolve({ base64: base64, width: w, height: h });
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    loadEvent();
  </script>
</body>
</html>
