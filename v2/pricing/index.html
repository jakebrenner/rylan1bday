<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing — Ryvite</title>
  <meta name="description" content="Choose your Ryvite plan and start creating beautiful AI-designed event invitations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --party-coral: #E94560; --blush-pop: #FF6B6B; --midnight: #1A1A2E;
      --confetti-gold: #FFB74D; --mint-fizz: #4ECDC4; --party-purple: #A78BFA; --cream: #FFFAF5;
    }
    html, body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--midnight); }

    /* Header */
    .header { background: white; border-bottom: 1px solid #eee; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-left a { text-decoration: none; display: flex; align-items: center; }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .btn { padding: 12px 20px; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: var(--party-coral); color: white; }
    .btn-primary:hover { background: var(--blush-pop); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3); }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { background: white; color: var(--midnight); border: 1px solid #ddd; }
    .btn-secondary:hover { border-color: var(--party-coral); color: var(--party-coral); }
    .btn-large { padding: 16px 32px; font-size: 16px; border-radius: 12px; }

    /* Hero */
    .hero { text-align: center; padding: 60px 20px 40px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--midnight); margin-bottom: 12px; }
    .hero p { font-size: 18px; color: #666; max-width: 600px; margin: 0 auto; }

    /* Plan cards grid */
    .plans-container { max-width: 820px; margin: 0 auto 60px; padding: 0 20px; display: flex; gap: 24px; align-items: stretch; }
    .plan-card-wrap { flex: 1; min-width: 0; }
    .plan-card {
      background: white; border-radius: 16px; padding: 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border: 2px solid #e0e0e0; position: relative; overflow: hidden; height: 100%; display: flex; flex-direction: column;
    }
    .plan-card.featured { border-color: var(--party-coral); box-shadow: 0 4px 24px rgba(233, 69, 96, 0.15); }
    .plan-badge {
      position: absolute; top: 16px; right: 16px; background: var(--party-coral); color: white;
      padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .plan-name { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 8px; }
    .plan-desc { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
    .plan-price { margin-bottom: 20px; }
    .plan-price .amount { font-size: 44px; font-weight: 700; color: var(--midnight); }
    .plan-price .period { font-size: 15px; color: #888; }
    .plan-price .original { text-decoration: line-through; color: #ccc; font-size: 20px; margin-right: 8px; }
    .plan-features { list-style: none; margin-bottom: 24px; flex: 1; }
    .plan-features li { padding: 8px 0; font-size: 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; }
    .plan-features li:last-child { border-bottom: none; }
    .plan-features .check { color: var(--mint-fizz); font-size: 16px; font-weight: 700; flex-shrink: 0; }

    /* Estimate box */
    .estimate-box {
      background: linear-gradient(135deg, #f0f9ff 0%, #fef3f2 100%);
      border: 1px solid #e8e8e8; border-radius: 12px; padding: 16px; margin-bottom: 20px;
    }
    .estimate-box .est-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 8px; }
    .estimate-box .est-total { font-size: 28px; font-weight: 700; color: var(--midnight); }
    .estimate-box .est-detail { font-size: 12px; color: #888; margin-top: 4px; line-height: 1.6; }
    .estimate-box .est-breakdown { margin-top: 10px; font-size: 12px; color: #666; }
    .estimate-box .est-breakdown span { display: inline-block; background: white; padding: 2px 8px; border-radius: 4px; margin: 2px 4px 2px 0; border: 1px solid #e8e8e8; }

    /* Coupon */
    .coupon-section { margin-bottom: 20px; }
    .coupon-row { display: flex; gap: 8px; }
    .coupon-input {
      flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 13px; text-transform: uppercase;
    }
    .coupon-input:focus { outline: none; border-color: var(--party-coral); box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1); }
    .coupon-btn { padding: 10px 16px; background: white; border: 1px solid #ddd; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
    .coupon-btn:hover { border-color: var(--party-coral); color: var(--party-coral); }
    .coupon-result { margin-top: 8px; font-size: 13px; padding: 8px 12px; border-radius: 6px; }
    .coupon-result.success { background: #d4edda; color: #155724; }
    .coupon-result.error { background: #f8d7da; color: #721c24; }
    .coupon-applied { display: flex; justify-content: space-between; align-items: center; background: #d4edda; padding: 10px 14px; border-radius: 8px; font-size: 13px; color: #155724; }
    .coupon-applied button { background: none; border: none; color: #721c24; cursor: pointer; font-size: 13px; font-weight: 600; }

    /* Already subscribed */
    .already-subscribed { text-align: center; padding: 16px 20px; background: #d4edda; border-radius: 12px; margin-bottom: 24px; max-width: 820px; margin-left: auto; margin-right: auto; }
    .already-subscribed h3 { color: #155724; font-size: 15px; margin-bottom: 4px; }
    .already-subscribed p { color: #155724; font-size: 13px; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--midnight); color: white; padding: 14px 24px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out; z-index: 100; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .loading { text-align: center; padding: 60px 20px; color: #666; font-size: 15px; }

    @media (max-width: 700px) {
      .plans-container { flex-direction: column; max-width: 440px; }
      .hero h1 { font-size: 32px; }
      .hero p { font-size: 16px; }
      .plan-card { padding: 28px; }
      .plan-price .amount { font-size: 36px; }
      .header { padding: 10px 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <a href="/"><svg viewBox="0 0 210 80" xmlns="http://www.w3.org/2000/svg" style="height:56px;width:auto;"><circle cx="32" cy="40" r="22" fill="none" stroke="var(--party-coral)" stroke-width="2.2"/><path d="M18 30 L32 42 L46 30" fill="none" stroke="var(--party-coral)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 50 L46 50" fill="none" stroke="var(--party-coral)" stroke-width="1.8" stroke-linecap="round"/><text x="64" y="52" font-family="Playfair Display, serif" font-size="34" font-weight="700" fill="var(--midnight)">Ryvite</text></svg></a>
    </div>
    <div class="header-right" id="headerActions">
      <a href="/v2/login/" class="btn btn-secondary">Log In</a>
      <a href="/v2/login/#signup" class="btn btn-primary">Sign Up</a>
    </div>
  </div>

  <div class="hero">
    <h1>Simple, transparent pricing</h1>
    <p>Create a stunning AI-designed invitation for your next event. Pay only for what you use, or choose a flat-rate plan.</p>
  </div>

  <div id="subscribedBanner"></div>

  <div class="plans-container" id="plansContainer">
    <div id="loading" class="loading" style="width:100%;">Loading plans...</div>
  </div>

  <script>
    var token = localStorage.getItem('sb_access_token');
    var user = JSON.parse(localStorage.getItem('v2_user') || 'null');
    var plans = [];
    var selectedPlan = null;
    var appliedCoupon = null;
    var discountInfo = null;
    var costEstimate = null;

    if (token && user) {
      document.getElementById('headerActions').innerHTML =
        '<a href="/v2/dashboard/" class="btn btn-secondary">Dashboard</a>';
    }

    init();

    async function init() {
      try {
        // Load plans and cost estimate in parallel
        var [plansRes, estRes] = await Promise.all([
          fetch('/api/v2/billing?action=plans'),
          fetch('/api/v2/billing?action=estimateCost')
        ]);
        var plansResult = await plansRes.json();
        var estResult = await estRes.json();

        if (estResult.success) costEstimate = estResult.estimate;

        if (plansResult.success && plansResult.plans.length > 0) {
          plans = plansResult.plans;
          renderPlans();
        } else {
          document.getElementById('loading').textContent = 'No plans available yet.';
        }
      } catch (err) {
        document.getElementById('loading').textContent = 'Error loading plans.';
      }
    }

    function renderPlans() {
      var container = document.getElementById('plansContainer');
      var hasActivePlan = user && user.hasActivePlan;

      if (hasActivePlan) {
        document.getElementById('subscribedBanner').innerHTML =
          '<div class="already-subscribed" style="margin-bottom:24px;padding:16px 20px;max-width:820px;margin-left:auto;margin-right:auto;"><h3>You already have an active plan</h3><p>Go to your <a href="/v2/dashboard/" style="color:#155724;font-weight:600;">dashboard</a> to create your event.</p></div>';
      }

      // Find the usage plan (pay as you go) and the fixed plan
      var usagePlan = plans.find(function(p) { return p.billingType === 'usage'; });
      var fixedPlan = plans.find(function(p) { return p.billingType !== 'usage'; });

      var html = '';

      // Render usage plan (featured, first)
      if (usagePlan) {
        html += renderPlanCard(usagePlan, true, hasActivePlan);
      }

      // Render fixed plan
      if (fixedPlan) {
        html += renderPlanCard(fixedPlan, !usagePlan, hasActivePlan);
      }

      container.innerHTML = html;
    }

    function renderPlanCard(plan, featured, disabled) {
      var isUsage = plan.billingType === 'usage';
      var price = plan.priceCents / 100;

      var priceHtml = '';
      if (isUsage) {
        priceHtml = '<div class="plan-price">'
          + '<span class="amount">$0</span>'
          + '<span class="period"> upfront</span>'
          + '</div>';
      } else {
        priceHtml = '<div class="plan-price">'
          + '<span class="amount">$' + price.toFixed(2) + '</span>'
          + '<span class="period"> / event</span>'
          + '</div>';
      }

      // Estimate box for usage plan
      var estimateHtml = '';
      if (isUsage && costEstimate) {
        var est = costEstimate;
        estimateHtml = '<div class="estimate-box">'
          + '<div class="est-title">Estimated cost per event</div>'
          + '<div class="est-total">~$' + (est.totalCents / 100).toFixed(2) + '</div>'
          + '<div class="est-detail">'
          + 'AI design: ~$' + (est.aiCostCents / 100).toFixed(2)
          + ' &middot; SMS (' + est.breakdown.smsMessages + ' msgs): ~$' + (est.smsCostCents / 100).toFixed(2)
          + '</div>'
          + '<div class="est-breakdown">'
          + 'Based on <span>' + est.breakdown.initialGenerations + ' design</span>'
          + '<span>' + est.breakdown.tweaks + ' tweaks</span>'
          + '<span>' + est.breakdown.chatMessages + ' chat msgs</span>'
          + '<span>' + est.breakdown.smsMessages + ' texts</span>'
          + ' using <span>' + escapeHtml(est.breakdown.themeModelLabel) + '</span>'
          + '</div>'
          + '</div>';
      }

      // SMS pricing line for fixed plan
      var smsLineHtml = '';
      if (!isUsage) {
        smsLineHtml = '<div style="font-size:13px;color:#666;margin:-12px 0 20px;display:flex;align-items:center;gap:6px;">'
          + '<span style="font-weight:600;color:var(--midnight);">+ $' + ((plan.smsPriceCents || 5) / 100).toFixed(2) + '</span> per text message sent'
          + '</div>';
      }

      var features = plan.features || [];
      var featuresHtml = features.map(function(f) {
        return '<li><span class="check">&#10003;</span> ' + escapeHtml(f) + '</li>';
      }).join('');

      var badgeHtml = featured ? '<span class="plan-badge">Recommended</span>' : '';

      return '<div class="plan-card-wrap">'
        + '<div class="plan-card' + (featured ? ' featured' : '') + '" data-plan-id="' + plan.id + '">'
        + badgeHtml
        + '<div class="plan-name">' + escapeHtml(plan.displayName) + '</div>'
        + '<div class="plan-desc">' + escapeHtml(plan.description) + '</div>'
        + priceHtml
        + smsLineHtml
        + estimateHtml
        + '<ul class="plan-features">' + featuresHtml + '</ul>'
        + '<button class="btn btn-primary btn-large" style="width:100%;" '
        + 'onclick="startCheckout(\'' + plan.id + '\')" '
        + (disabled ? 'disabled' : '')
        + '>'
        + (disabled ? 'Already Subscribed' : 'Get Started')
        + '</button>'
        + '</div></div>';
    }

    async function startCheckout(planId) {
      var plan = plans.find(function(p) { return p.id === planId; });
      if (!plan) return;
      selectedPlan = plan;

      if (!token || !user) {
        localStorage.setItem('post_login_redirect', '/v2/pricing/');
        window.location.href = '/v2/login/#signup';
        return;
      }

      var btn = document.querySelector('[data-plan-id="' + planId + '"] button');
      if (btn) { btn.disabled = true; btn.textContent = 'Redirecting to checkout...'; }

      try {
        var res = await fetch('/api/v2/billing?action=checkout', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({
            planId: plan.id,
            couponCode: null,
            origin: window.location.origin
          })
        });

        var result = await res.json();
        if (result.success && result.url) {
          window.location.href = result.url;
        } else {
          showToast(result.error || 'Error creating checkout session');
          if (btn) { btn.disabled = false; btn.textContent = 'Get Started'; }
        }
      } catch (err) {
        showToast('Error connecting to payment provider');
        if (btn) { btn.disabled = false; btn.textContent = 'Get Started'; }
      }
    }

    function escapeHtml(str) { var d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

    function showToast(message) {
      var toast = document.createElement('div');
      toast.className = 'toast'; toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 3000);
    }
  </script>
</body>
</html>
