<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Ryvite</title>
  <meta name="description" content="Sign in to Ryvite to create beautiful AI-designed event invitations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --party-coral: #E94560;
      --blush-pop: #FF6B6B;
      --midnight: #1A1A2E;
      --confetti-gold: #FFB74D;
      --mint-fizz: #4ECDC4;
      --party-purple: #A78BFA;
      --cream: #FFFAF5;
    }
    html, body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--midnight) 0%, #2a2a4e 100%);
      color: var(--midnight);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }
    .login-header { text-align: center; margin-bottom: 40px; }
    .login-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--midnight);
      margin-bottom: 8px;
    }
    .login-header p { font-size: 14px; color: #666; }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--midnight);
      margin-bottom: 8px;
    }
    input[type="email"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input[type="email"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--party-coral);
      box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
    }
    .btn {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--party-coral); color: white; }
    .btn-primary:hover {
      background: var(--blush-pop);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
    }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .message {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .message.success { background: #d4edda; color: #155724; display: block; }
    .message.error { background: #f8d7da; color: #721c24; display: block; }
    .message.info { background: #cce5ff; color: #004085; display: block; }
    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { text-align: center; margin: 30px 0 20px; font-size: 13px; color: #999; }
    .toggle-mode { text-align: center; font-size: 13px; }
    .toggle-mode button {
      background: none;
      border: none;
      color: var(--party-coral);
      cursor: pointer;
      font-weight: 600;
      text-decoration: underline;
      font-family: 'Inter', sans-serif;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #999;
    }
    .back-link a { color: #999; text-decoration: none; }
    .back-link a:hover { color: var(--party-coral); }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>Ryvite</h1>
      <p>Create beautiful AI-designed event invites</p>
    </div>

    <div id="message" class="message"></div>

    <!-- Login Mode -->
    <div id="loginMode">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <button class="btn btn-primary" id="submitBtn" onclick="handleLogin()">Send Magic Link</button>
      <div class="divider">or</div>
      <div class="toggle-mode">
        Don't have an account? <button id="toggleToSignup" onclick="toggleMode('signup')">Sign up</button>
      </div>
    </div>

    <!-- Signup Mode -->
    <div id="signupMode" style="display: none;">
      <div class="form-group">
        <label for="signupName">Name</label>
        <input type="text" id="signupName" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label for="signupEmail">Email Address</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="signupPhone">Phone (optional)</label>
        <input type="text" id="signupPhone" placeholder="(555) 123-4567">
      </div>
      <button class="btn btn-primary" id="submitSignupBtn" onclick="handleSignup()">Create Account</button>
      <div class="divider">or</div>
      <div class="toggle-mode">
        Already have an account? <button onclick="toggleMode('login')">Log in</button>
      </div>
    </div>

    <div class="back-link"><a href="/">&larr; Back to Ryvite</a></div>
  </div>

  <script>
    const messageEl = document.getElementById('message');

    // Check for magic link token on page load
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) {
      handleMagicLink(token);
    }

    // Check if already logged in
    const existingSession = localStorage.getItem('sessionToken');
    const existingUser = localStorage.getItem('user');
    if (existingSession && existingUser && !token) {
      window.location.href = '/dashboard/';
    }

    async function handleMagicLink(token) {
      showMessage('Verifying your link...', 'info');
      try {
        const response = await fetch('/api/auth?action=verify&token=' + encodeURIComponent(token));
        const result = await response.json();

        if (result.success) {
          localStorage.setItem('sessionToken', result.sessionToken);
          localStorage.setItem('user', JSON.stringify(result.user));
          showMessage('Login successful! Redirecting...', 'success');
          setTimeout(function() {
            window.location.href = '/dashboard/';
          }, 1000);
        } else {
          showMessage('Invalid or expired link. Please try again.', 'error');
        }
      } catch (err) {
        console.error(err);
        showMessage('Error verifying link. Please try again.', 'error');
      }
    }

    function toggleMode(mode) {
      document.getElementById('loginMode').style.display = mode === 'signup' ? 'none' : 'block';
      document.getElementById('signupMode').style.display = mode === 'signup' ? 'block' : 'none';
      messageEl.style.display = 'none';
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showMessage('Please enter your email', 'error');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>Sending...';

      try {
        const response = await fetch('/api/auth?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const result = await response.json();

        if (result.success) {
          showMessage('Check your email for a login link!', 'success');
          document.getElementById('email').value = '';
        } else {
          showMessage(result.error || 'Error sending link', 'error');
        }
      } catch (err) {
        console.error(err);
        showMessage('Error sending link. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Send Magic Link';
      }
    }

    async function handleSignup() {
      const displayName = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const phone = document.getElementById('signupPhone').value.trim();

      if (!displayName || !email) {
        showMessage('Please fill in name and email', 'error');
        return;
      }

      const btn = document.getElementById('submitSignupBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>Creating account...';

      try {
        const response = await fetch('/api/auth?action=signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ displayName, email, phone })
        });
        const result = await response.json();

        if (result.success) {
          showMessage('Account created! Check your email for a login link.', 'success');
          setTimeout(function() { toggleMode('login'); }, 2000);
        } else {
          showMessage(result.error || 'Error creating account', 'error');
        }
      } catch (err) {
        console.error(err);
        showMessage('Error creating account. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Create Account';
      }
    }

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
    }

    // Allow Enter key to submit
    document.getElementById('email').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('signupEmail').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSignup();
    });
  </script>
</body>
</html>
